;===============================================================================
; ANSIBLE INVENTORY - PRODUCTIE OMGEVING
;===============================================================================

[all:vars]
ansible_user = ansible
ansible_ssh_private_key_file = ~/.ssh/id_ed25519
ansible_python_interpreter = /usr/bin/python3
environment = production

;------------------------------------------------------------------------------
; DOCKER HOSTS
;------------------------------------------------------------------------------
[docker_hosts]
docker-01 ansible_host=10.10.10.10
docker-02 ansible_host=10.10.10.11
docker-03 ansible_host=10.10.10.12

;------------------------------------------------------------------------------
; DATABASE SERVERS
;------------------------------------------------------------------------------
[database_servers]
postgres-01 ansible_host=10.10.40.10
redis-01 ansible_host=10.10.40.11
mongodb-01 ansible_host=10.10.40.12

[postgresql_servers]
postgres-01

[redis_servers]
redis-01

;------------------------------------------------------------------------------
; MONITORING SERVERS
;------------------------------------------------------------------------------
[monitoring_servers]
monitoring-01 ansible_host=10.10.10.20

[monitoring]
monitoring-01 ansible_host=10.10.10.20

;------------------------------------------------------------------------------
; WEB SERVERS
;------------------------------------------------------------------------------
[webservers]
web-01 ansible_host=10.10.20.10
web-02 ansible_host=10.10.20.11

[nginx_servers]
web-01
web-02

;------------------------------------------------------------------------------
; AI/LLM SERVERS
;------------------------------------------------------------------------------
[ai_servers]
ai-01 ansible_host=10.10.30.10 gpu=true
ai-02 ansible_host=10.10.30.11 gpu=true

[ollama_servers]
ai-01
ai-02

;------------------------------------------------------------------------------
; MEDIA SERVERS
;------------------------------------------------------------------------------
[media_servers]
media-01 ansible_host=10.10.50.10

[jellyfin_servers]
media-01

;------------------------------------------------------------------------------
; BACKUP SERVERS
;------------------------------------------------------------------------------
[backup_servers]
backup-01 ansible_host=10.10.10.30

[backup]
backup-01 ansible_host=10.10.10.30

[minio_servers]
backup-01

;------------------------------------------------------------------------------
; APPLICATIE SERVERS
;------------------------------------------------------------------------------
[application_servers]
app-01 ansible_host=10.10.30.20
app-02 ansible_host=10.10.30.21

;------------------------------------------------------------------------------
; KUBERNETES NODES
;------------------------------------------------------------------------------
[kubernetes_nodes]
k8s-master-01 ansible_host=10.10.10.101
k8s-worker-01 ansible_host=10.10.20.101

;------------------------------------------------------------------------------
; MANAGEMENT SERVERS
;------------------------------------------------------------------------------
[management]
ansible-01 ansible_host=10.10.10.1

;------------------------------------------------------------------------------
; COMPLETE GROEPEN
;------------------------------------------------------------------------------
[all_servers:children]
docker_hosts
database_servers
monitoring_servers
webservers
ai_servers
media_servers
backup_servers
application_servers
kubernetes_nodes
management
