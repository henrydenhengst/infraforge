---
# =============================================================================
# PROXY TOOLS
# =============================================================================
# Functie: proxy
# Beschrijving: Tools voor reverse proxies, load balancers en API gateways
# =============================================================================

proxy_tools:
  # ---------------------------------------------------------------------------
  # REVERSE PROXIES
  # ---------------------------------------------------------------------------
  - name: Traefik
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "Modern reverse proxy met automatische SSL"
    categorie: reverse_proxy
    docker_image: traefik:latest
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_config:/etc/traefik
      - traefik_certs:/etc/certs
      - traefik_logs:/var/log/traefik
    environment:
      CF_API_EMAIL: "{{ cloudflare_email }}"
      CF_API_KEY: "{{ vault_cloudflare_api_key }}"
    url: "https://traefik.io"
    
  - name: Nginx
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "Webserver en reverse proxy"
    categorie: reverse_proxy
    docker_image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_config:/etc/nginx
      - nginx_html:/usr/share/nginx/html
      - nginx_logs:/var/log/nginx
      - nginx_certs:/etc/nginx/ssl
    url: "https://nginx.org"
    
  - name: Caddy
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "Webserver met automatische HTTPS"
    categorie: reverse_proxy
    docker_image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    environment:
      ACME_AGREE: "true"
    url: "https://caddyserver.com"
    
  # ---------------------------------------------------------------------------
  # LOAD BALANCERS
  # ---------------------------------------------------------------------------
  - name: HAProxy
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "High-performance load balancer"
    categorie: load_balancer
    docker_image: haproxy:latest
    ports:
      - "80:80"
      - "443:443"
      - "8404:8404"
      - "1024:1024"
    volumes:
      - haproxy_config:/usr/local/etc/haproxy
      - haproxy_certs:/etc/ssl/certs
      - haproxy_logs:/var/log/haproxy
    url: "https://www.haproxy.org"
    
  - name: Envoy
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "Cloud-native proxy voor microservices"
    categorie: edge_proxy
    docker_image: envoyproxy/envoy:latest
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - envoy_config:/etc/envoy
      - envoy_logs:/var/log/envoy
    url: "https://www.envoyproxy.io"
    
  # ---------------------------------------------------------------------------
  # API GATEWAYS
  # ---------------------------------------------------------------------------
  - name: Kong
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "API Gateway voor microservices"
    categorie: api_gateway
    docker_image: kong:latest
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"
    volumes:
      - kong_data:/usr/local/kong
      - kong_config:/etc/kong
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: "{{ vault_kong_password }}"
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    database: postgresql
    url: "https://konghq.com"
    
  # ---------------------------------------------------------------------------
  # WEB PROXIES
  # ---------------------------------------------------------------------------
  - name: Squid
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "Webproxy voor caching en filtering"
    categorie: web_proxy
    docker_image: sameersbn/squid:latest
    ports:
      - "3128:3128"
    volumes:
      - squid_config:/etc/squid
      - squid_cache:/var/spool/squid
      - squid_logs:/var/log/squid
    url: "http://www.squid-cache.org"
    
  - name: Varnish
    profiel_tag: IT
    functie_tag: proxy
    beschrijving: "Web-accelerator cache"
    categorie: cache
    docker_image: varnish:latest
    ports:
      - "80:80"
      - "6081:6081"
    volumes:
      - varnish_config:/etc/varnish
      - varnish_cache:/var/lib/varnish
    url: "https://varnish-cache.org"

# =============================================================================
# GROEP VARIABELEN
# =============================================================================
proxy_defaults:
  # Algemene instellingen
  backup_enabled: true
  backup_schedule: "0 2 * * *"
  monitoring_enabled: true
  log_level: info
  
  # Domein instellingen
  domain:
    primary: "{{ domain }}"
    aliases:
      - "www.{{ domain }}"
      - "api.{{ domain }}"
      - "app.{{ domain }}"
      
  # SSL/TLS
  ssl:
    provider: letsencrypt
    email: admin@{{ domain }}
    staging: false
    renew_before: 30
    key_type: ec256
    
  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_second: 100
    burst: 50
    
  # Headers
  security_headers:
    enabled: true
    hsts_max_age: 31536000
    hsts_include_subdomains: true
    hsts_preload: true
    x_frame_options: DENY
    x_content_type_options: nosniff
    x_xss_protection: "1; mode=block"
    referrer_policy: strict-origin-when-cross-origin
    
  # Compression
  compression:
    enabled: true
    types:
      - text/html
      - text/css
      - text/javascript
      - application/javascript
      - application/json
      - application/xml
    level: 6
    
  # Caching
  cache:
    enabled: true
    ttl: 3600
    methods:
      - GET
      - HEAD

# =============================================================================
# TOOL-SPECIFIEKE CONFIGURATIES
# =============================================================================

traefik_config:
  # Traefik entrypoints
  entrypoints:
    web:
      address: ":80"
      http:
        redirections:
          entrypoint:
            to: websecure
            scheme: https
            
    websecure:
      address: ":443"
      
    traefik:
      address: ":8080"
      
  # Traefik providers
  providers:
    docker:
      endpoint: "unix:///var/run/docker.sock"
      exposedByDefault: false
      network: traefik-public
      
    file:
      filename: /etc/traefik/dynamic.yml
      
  # Traefik certificates
  certificatesResolvers:
    letsencrypt:
      acme:
        email: admin@{{ domain }}
        storage: /etc/certs/acme.json
        httpChallenge:
          entryPoint: web
          
    cloudflare:
      acme:
        email: admin@{{ domain }}
        storage: /etc/certs/acme-cloudflare.json
        dnsChallenge:
          provider: cloudflare
          delayBeforeCheck: 0
          
  # Traefik routing
  routers:
    - name: api
      rule: "Host(`api.{{ domain }}`)"
      service: api-service
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - rate-limit
        - security-headers
        
    - name: app
      rule: "Host(`app.{{ domain }}`)"
      service: app-service
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
        
  # Traefik services
  services:
    - name: api-service
      loadBalancer:
        servers:
          - url: "http://api-server:3000"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s
          
    - name: app-service
      loadBalancer:
        servers:
          - url: "http://app-server:8080"
          
  # Traefik middlewares
  middlewares:
    - name: rate-limit
      rateLimit:
        average: 100
        burst: 50
        
    - name: security-headers
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        
    - name: auth
      basicAuth:
        users:
          - "admin:$2y$10$..."
          
  # Traefik logs
  logs:
    access:
      enabled: true
      filePath: /var/log/traefik/access.log
      format: json
    general:
      level: INFO
      filePath: /var/log/traefik/traefik.log

nginx_config:
  # Nginx upstreams
  upstreams:
    - name: backend
      servers:
        - backend1:8080 weight=3
        - backend2:8080 weight=2
        - backend3:8080 backup
        
    - name: api
      servers:
        - api1:3000
        - api2:3000
        
  # Nginx servers
  servers:
    - name: default
      listen: 80
      server_name: _
      return: 301 https://$host$request_uri
      
    - name: main
      listen: 443 ssl http2
      server_name: "{{ domain }} www.{{ domain }}"
      
      ssl_certificate: /etc/nginx/ssl/{{ domain }}/fullchain.pem
      ssl_certificate_key: /etc/nginx/ssl/{{ domain }}/privkey.pem
      ssl_protocols: TLSv1.2 TLSv1.3
      ssl_ciphers: HIGH:!aNULL:!MD5
      
      location / {
        proxy_pass http://backend
        proxy_set_header Host $host
        proxy_set_header X-Real-IP $remote_addr
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for
        proxy_set_header X-Forwarded-Proto $scheme
      }
      
      location /api/ {
        proxy_pass http://api
        proxy_set_header Host $host
        proxy_set_header X-Real-IP $remote_addr
      }
      
      access_log /var/log/nginx/access.log
      error_log /var/log/nginx/error.log

haproxy_config:
  # HAProxy global
  global:
    log: /dev/log local0
    log: /dev/log local1 notice
    chroot: /var/lib/haproxy
    stats: socket /var/lib/haproxy/stats
    user: haproxy
    group: haproxy
    daemon: true
    
  # HAProxy defaults
  defaults:
    log: global
    mode: http
    option: httplog
    option: dontlognull
    retries: 3
    timeout: http-request 10s
    timeout: queue 1m
    timeout: connect 10s
    timeout: client 1m
    timeout: server 1m
    timeout: check 10s
    maxconn: 3000
    
  # HAProxy frontends
  frontends:
    - name: http-in
      bind: "*:80"
      redirect: scheme https code 301 if !{ ssl_fc }
      
    - name: https-in
      bind: "*:443 ssl crt /etc/ssl/certs/{{ domain }}.pem"
      http-request: set-header X-Forwarded-Proto https if { ssl_fc }
      default_backend: web-backend
      
    - name: stats
      bind: "*:8404"
      stats: enable
      stats: uri /stats
      stats: refresh 10s
      stats: auth admin:{{ vault_haproxy_stats_password }}
      
  # HAProxy backends
  backends:
    - name: web-backend
      balance: roundrobin
      option: httpchk HEAD /health HTTP/1.1\r\nHost:\ localhost
      servers:
        - web1 10.0.1.10:80 check
        - web2 10.0.1.11:80 check
        - web3 10.0.1.12:80 check
        
    - name: api-backend
      balance: leastconn
      option: httpchk GET /health
      servers:
        - api1 10.0.2.10:3000 check
        - api2 10.0.2.11:3000 check
