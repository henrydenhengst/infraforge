---
# ====================================
# DUCKDNS CREDENTIALS (VERPLICHT)
# ====================================
# Dit zijn de enige verplichte geheimen voor een basis installatie
duckdns_domain: "jouw-domein-naam"        # Bijv: "linuxcafe-haarlem"
duckdns_token: "jouw-duckdns-token"       # Te vinden op duckdns.org dashboard

# ====================================
# MATTERMOST CONFIGURATIE (OPTIONEEL)
# ====================================
# Alleen invullen als mattermost_enabled: true in vars.yml
mattermost_db_password: "{{ vault_mattermost_db_password }}"     # Database wachtwoord
mattermost_admin_username: "admin"                                 # Admin gebruikersnaam
mattermost_admin_password: "{{ vault_mattermost_admin_password }}" # Admin wachtwoord
mattermost_admin_email: "admin@linuxcafe-haarlem.nl"               # Admin email
mattermost_smtp_password: "{{ vault_mattermost_smtp_password }}"   # SMTP wachtwoord (optioneel)

# ====================================
# OPTIONEEL: GRAV ADMIN WACHTWOORD
# ====================================
# Voor pre-configuratie van Grav admin account
grav_admin_username: "admin"                                      # Grav admin user
grav_admin_email: "webmaster@linuxcafe-haarlem.nl"                # Grav admin email
grav_admin_password: "{{ vault_grav_admin_password }}"            # Grav admin wachtwoord

# ====================================
# OPTIONEEL: SSL CERTIFICATE
# ====================================
# Als je een custom SSL certificaat gebruikt i.p.v. DuckDNS
ssl_cert_email: "admin@linuxcafe-haarlem.nl"                     # Email voor LetsEncrypt
ssl_cert_key: "{{ vault_ssl_cert_key }}"                         # Custom private key
ssl_cert_crt: "{{ vault_ssl_cert_crt }}"                         # Custom certificaat

# ====================================
# OPTIONEEL: DATABASE WACHTWOORDEN
# ====================================
# Voor als je een aparte database gebruikt (niet voor Mattermost)
database_root_password: "{{ vault_database_root_password }}"      # Database root password
database_app_password: "{{ vault_database_app_password }}"        # Applicatie database user

# ====================================
# OPTIONEEL: API KEYS & TOKENS
# ====================================
# Voor integraties met andere services
cloudflare_api_token: "{{ vault_cloudflare_api_token }}"          # Als je Cloudflare gebruikt
github_webhook_secret: "{{ vault_github_webhook_secret }}"        # Voor CI/CD
monitoring_api_key: "{{ vault_monitoring_api_key }}"              # Voor monitoring tools

# ====================================
# OPTIONEEL: BACKUP CREDENTIALS
# ====================================
# Alleen nodig als backup_enabled: true en externe backup gebruikt
backup_rsync_password: "{{ vault_backup_rsync_password }}"        # Rsync daemon wachtwoord
backup_ssh_key: "{{ vault_backup_ssh_key }}"                      # SSH private key voor backup server