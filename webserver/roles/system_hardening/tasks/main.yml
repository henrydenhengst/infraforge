---
# SSH Hardening
- name: Change SSH port
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port '
    line: "Port {{ ssh_port }}"
  notify: restart sshd

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin no"
  notify: restart sshd

- name: Disable password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication no"
  notify: restart sshd

- name: Enable pubkey auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: "PubkeyAuthentication yes"
  notify: restart sshd

# UFW Firewall
- name: Install UFW
  package:
    name: ufw
    state: present

- name: Set UFW defaults
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: 'incoming', policy: 'deny' }
    - { direction: 'outgoing', policy: 'allow' }

- name: Allow SSH on custom port
  ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow HTTP/HTTPS
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ caddy_http_port }}"
    - "{{ caddy_https_port }}"

- name: Allow IPFS p2p
  ufw:
    rule: allow
    port: "{{ ipfs_port }}"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled

# Fail2ban
- name: Install Fail2ban
  package:
    name: fail2ban
    state: present

- name: Configure fail2ban
  template:
    src: fail2ban-jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban

- name: Enable fail2ban
  service:
    name: fail2ban
    enabled: yes
    state: started

handlers:
  - name: restart sshd
    service:
      name: sshd
      state: restarted
  - name: restart fail2ban
    service:
      name: fail2ban
      state: restarted