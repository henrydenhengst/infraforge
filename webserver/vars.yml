---
# ====================================
# BASIS CONFIGURATIE
# ====================================
domain: "linuxcafe.duckdns.org"
admin_email: "admin@linuxcafehaarlem.nl"

# ====================================
# NETWERK (Static IP)
# ====================================
server_ip: "192.168.178.2"
server_netmask: "255.255.255.0"
server_gateway: "192.168.178.1"
dns_servers: ["1.1.1.1", "9.9.9.9"]

# ====================================
# POORTEN
# ====================================
ssh_port: 2222
caddy_http_port: 80
caddy_https_port: 443
ipfs_port: 4001
ipfs_gateway_port: 8080
syncthing_relay_tcp: 22067
syncthing_relay_status: 22070
nostr_relay_port: 8008
tor_snowflake_port: 9901

# ====================================
# SECURITY
# ====================================
fail2ban_bantime: 3600
fail2ban_maxretry: 5

# ====================================
# SYSTEEMGEBRUIKERS
# ====================================
system_user: "caddy"  # Caddy draait als eigen user
php_user: "caddy"
ipfs_user: "ipfs"
nostr_user: "nostr"
syncthing_user: "syncthing"
tor_user: "_tor"

# ====================================
# PADEN
# ====================================
grav_path: "/var/www/linuxcafehaarlem"
data_path: "/var/data"
ipfs_path: "/var/lib/ipfs"
backup_path: "/var/backups"

# ====================================
# IPFS SPECIFIEK
# ====================================
ipfs_gateway: "/ipfs/ipns"  # Gateway prefix
ipfs_swarm_key: "/var/lib/ipfs/swarm.key"

# ====================================
# NOSTR RELAY SPECIFIEK
# ====================================
nostr_db_path: "/var/lib/nostr"
nostr_max_connections: 10000
nostr_event_limit: 5000

# ====================================
# SYNCTHING RELAY SPECIFIEK
# ====================================
syncthing_relay_pool: "https://relays.syncthing.net/endpoint"

# ====================================
# TOR SNOWFLAKE SPECIFIEK
# ====================================
tor_snowflake_capacity: 10  # Aantal simultane proxies