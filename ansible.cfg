# =============================================================================
# ANSIBLE CONFIGURATIE BESTAND
# =============================================================================
# Dit bestand bevat de globale configuratie voor alle Ansible-uitvoeringen.
# Beheer via: ~/ansible-infrastructure/ansible.cfg
# =============================================================================

[defaults]

# -----------------------------------------------------------------------------
# INVENTORY
# -----------------------------------------------------------------------------
# Standaard inventory bestand (kan worden overschreven met -i)
inventory = inventory/production/hosts.ini

# Schakel host key checking uit voor nieuwe hosts (alleen voor interne netwerken!)
host_key_checking = False

# Verzamel feiten slim (alleen nieuwe feiten ophalen)
gathering = smart

# Cache feiten voor betere prestatie
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_cache
fact_caching_timeout = 3600

# -----------------------------------------------------------------------------
# GEBRUIKERS EN RECHTEN
# -----------------------------------------------------------------------------
# Standaard remote gebruiker (kan worden overschreven in inventory)
remote_user = ansible

# Private key bestand voor SSH
private_key_file = ~/.ssh/id_ed25519

# Word root op de remote machine (vereist sudo-rechten)
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# -----------------------------------------------------------------------------
# SSH CONFIGURATIE
# -----------------------------------------------------------------------------
# SSH arguments voor betere prestatie en stabiliteit
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no

# Gebruik pipelining voor snellere uitvoering (geen aparte scp-stap)
pipelining = True

# Timeout voor SSH-verbindingen
timeout = 30

# -----------------------------------------------------------------------------
# PRESTATIES
# -----------------------------------------------------------------------------
# Aantal parallelle forks (pas aan op basis van hardware)
forks = 20

# Poll interval voor async taken
poll_interval = 15

# -----------------------------------------------------------------------------
# PADEN
# -----------------------------------------------------------------------------
# Waar zoekt Ansible naar rollen?
roles_path = roles

# Aangepaste modules
library = ./library

# Aangepaste filter plugins
filter_plugins = ./filter_plugins

# Aangepaste callback plugins
callback_plugins = ./callback_plugins

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
# Log bestand (handig voor debugging)
log_path = ./logs/ansible.log

# Output formaat (yaml is leesbaarder dan standaard)
stdout_callback = yaml

# Callback plugins voor extra informatie
callbacks_enabled = profile_tasks, timer

# -----------------------------------------------------------------------------
# FOUTAFHANDELING
# -----------------------------------------------------------------------------
# Bewaar .retry bestanden voor mislukte plays
retry_files_enabled = True
retry_files_save_path = ~/.ansible-retry

# Negeer fouten bij bepaalde modules (indien nodig)
# ignore_errors = False

# -----------------------------------------------------------------------------
# VARIABELEN
# -----------------------------------------------------------------------------
# Variable plugins om te laden
vars_plugins_enabled = host_group_vars, community.general.random_mac

# Tekst die wordt toegevoegd aan beheerde bestanden
ansible_managed = Ansible managed: {file} modified on %Y-%m-%d %H:%M:%S

# -----------------------------------------------------------------------------
# ANDERE INSTELLINGEN
# -----------------------------------------------------------------------------
# Forceer kleurrijke output
color = True

# Display van taaknamen
display_args_to_stdout = False

# -----------------------------------------------------------------------------
# INVENTORY PLUGINS
# -----------------------------------------------------------------------------
[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

# -----------------------------------------------------------------------------
# PRIVILEGE ESCALATIE
# -----------------------------------------------------------------------------
[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# -----------------------------------------------------------------------------
# SSH CONNECTION (gedetailleerd)
# -----------------------------------------------------------------------------
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
control_path = /tmp/ansible-%%h-%%p-%%r
pipelining = True
scp_if_ssh = True

# Timeout voor verbinding
timeout = 30

# -----------------------------------------------------------------------------
# PERSISTENTE CONNECTIES
# -----------------------------------------------------------------------------
[persistent_connection]
connect_timeout = 30
command_timeout = 30

# -----------------------------------------------------------------------------
# NETWORK CONFIGURATIE (voor netwerk apparaten)
# -----------------------------------------------------------------------------
[netconf_connection]
netconf_port = 830

[network_cli_connection]
network_cli_port = 22

# =============================================================================
# EINDE CONFIGURATIE
# =============================================================================
