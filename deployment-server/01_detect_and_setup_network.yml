---
- name: Detect Network Interfaces and Setup Initial Configuration
  hosts: localhost
  become: yes
  vars:
    gateway_ip: ""  # Laat leeg voor auto-detectie
    internal_subnet: "10.10.10.0/24"
    dhcp_range_start: "10.10.10.100"
    dhcp_range_end: "10.10.10.200"
    dhcp_router: "10.10.10.1"
    dns_servers: ["8.8.8.8", "1.1.1.1"]
    backup_dir: "/root/deployment_backups/{{ ansible_date_time.epoch }}"
    required_python_packages:
      - netaddr
      - ipaddress
      - jinja2

  tasks:
    # ============================================
    # 1. PREREQUISITES & VALIDATIE
    # ============================================
    - name: Install required Python packages for network operations
      pip:
        name: "{{ required_python_packages }}"
        state: present

    - name: Verify Python netaddr module is available
      command: python3 -c "import netaddr"
      register: netaddr_check
      failed_when: netaddr_check.rc != 0
      changed_when: false

    # ============================================
    # 2. BACKUP BESTAANDE CONFIGURATIES
    # ============================================
    - name: Create backup directory with timestamp
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0700'

    - name: Backup existing network configurations
      find:
        paths: 
          - /etc/netplan
          - /etc/network
          - /etc/dhcp
          - /etc/default/isc-dhcp-server
        patterns: "*.yaml,*.conf,*.interfaces"
      register: network_configs
      ignore_errors: yes

    - name: Copy configs to backup with metadata
      copy:
        src: "{{ item.path }}"
        dest: "{{ backup_dir }}/{{ item.path | basename }}.{{ ansible_date_time.epoch }}.backup"
        remote_src: yes
      loop: "{{ network_configs.files }}"
      when: network_configs.files is defined
      ignore_errors: yes

    - name: Create backup manifest
      copy:
        content: |
          Backup created: {{ ansible_date_time.iso8601 }}
          Hostname: {{ ansible_hostname }}
          Interfaces before changes: {{ ansible_interfaces | join(', ') }}
          Config files backed up: {{ network_configs.files | length | default(0) }}
        dest: "{{ backup_dir }}/MANIFEST.txt"
        mode: '0644'

    # ============================================
    # 3. NIC DETECTIE (GEBRUIKT ANSIBLE FACTS)
    # ============================================
    - name: Get all physical network interfaces (verbeterd)
      set_fact:
        all_interfaces: >-
          {{ ansible_interfaces 
             | reject('equalto', 'lo') 
             | reject('search', '^(veth|docker|br-|virbr)') 
             | list }}

    - name: Display detected interfaces
      debug:
        msg: "Gedetecteerde fysieke netwerk interfaces: {{ all_interfaces }}"

    - name: Set upstream interface using Ansible facts
      set_fact:
        upstream_interface: "{{ ansible_default_ipv4.interface }}"
      when: ansible_default_ipv4.interface is defined and ansible_default_ipv4.interface in all_interfaces

    - name: Fallback - detect upstream interface via routing table
      shell: ip route | grep default | awk '{print $5}' | head -n1
      register: fallback_interface
      when: upstream_interface is not defined
      changed_when: false

    - name: Set upstream interface from fallback
      set_fact:
        upstream_interface: "{{ fallback_interface.stdout }}"
      when: upstream_interface is not defined and fallback_interface.stdout != ""

    - name: Validate upstream interface exists
      fail:
        msg: "Cannot detect upstream interface. Check network connectivity."
      when: upstream_interface not in all_interfaces

    - name: Test internet connectivity via upstream interface
      uri:
        url: https://8.8.8.8
        timeout: 5
        status_code: 200
      register: internet_test
      ignore_errors: yes

    - name: Warn if no internet connectivity
      debug:
        msg: "⚠️ WARNING: Upstream interface {{ upstream_interface }} has no internet connectivity. Clients will not have internet access."
      when: internet_test is failed

    - name: Set internal interface (other NICs)
      set_fact:
        internal_interface: "{{ all_interfaces | reject('equalto', upstream_interface) | first }}"
      when: all_interfaces | length >= 2

    - name: Fail if only one NIC detected
      fail:
        msg: |
          ✗ Only one network interface found. Deployment server requires at least 2 NICs.
          Detected: {{ all_interfaces | join(', ') }}
          Please add a second network adapter.
      when: all_interfaces | length < 2

    - name: Display interface assignment
      debug:
        msg:
          - "✅ Upstream interface (internet): {{ upstream_interface }}"
          - "✅ Internal interface (deployment LAN): {{ internal_interface }}"
          - "📡 Gateway: {{ ansible_default_ipv4.gateway | default('Auto-detected') }}"

    - name: Get gateway IP from Ansible facts
      set_fact:
        gateway_ip: "{{ ansible_default_ipv4.gateway }}"
      when: gateway_ip == "" and ansible_default_ipv4.gateway is defined

    # ============================================
    # 4. NETWORK CALCULATIONS (MET NETADDR)
    # ============================================
    - name: Calculate network parameters
      set_fact:
        internal_netmask: "{{ internal_subnet | ansible.utils.ipaddr('netmask') }}"
        internal_broadcast: "{{ internal_subnet | ansible.utils.ipaddr('broadcast') }}"
        internal_network: "{{ internal_subnet | ansible.utils.ipaddr('network') }}"
        internal_prefix: "{{ internal_subnet | ansible.utils.ipaddr('prefix') }}"

    - name: Validate internal subnet configuration
      fail:
        msg: "Invalid subnet configuration. dhcp_router {{ dhcp_router }} must be in subnet {{ internal_subnet }}"
      when: dhcp_router not in internal_subnet

    # ============================================
    # 5. SAVE CONFIGURATIE (YAML FORMAAT)
    # ============================================
    - name: Save network configuration as YAML
      copy:
        dest: /etc/deployment_server_network.yml
        content: |
          ---
          # Deployment Server Network Configuration
          # Generated: {{ ansible_date_time.iso8601 }}
          # Host: {{ ansible_hostname }}
          
          upstream_interface: {{ upstream_interface }}
          internal_interface: {{ internal_interface }}
          upstream_gateway: {{ gateway_ip | default('unknown') }}
          
          internal_subnet: {{ internal_subnet }}
          internal_netmask: {{ internal_netmask }}
          internal_broadcast: {{ internal_broadcast }}
          internal_network: {{ internal_network }}
          internal_prefix: {{ internal_prefix }}
          
          dhcp_range_start: {{ dhcp_range_start }}
          dhcp_range_end: {{ dhcp_range_end }}
          dhcp_router: {{ dhcp_router }}
          dns_servers: {{ dns_servers }}
        mode: '0600'
        backup: yes

    - name: Install initial required system packages
      apt:
        name:
          - python3-pip
          - python3-venv
          - git
          - curl
          - wget
          - vim
          - net-tools
          - ethtool
          - bridge-utils
        state: present
        update_cache: yes
        cache_valid_time: 3600

    - name: Display next steps
      debug:
        msg:
          - "╔══════════════════════════════════════════════════════════════╗"
          - "║  ✅ Network detection completed successfully                 ║"
          - "║  📁 Backup saved to: {{ backup_dir }}                       ║"
          - "║  📄 Config saved to: /etc/deployment_server_network.yml     ║"
          - "║  🚀 Next step: Run 02_full_deployment_server.yml            ║"
          - "╚══════════════════════════════════════════════════════════════╝"