---
- name: Rollback Deployment Server Configuration
  hosts: localhost
  become: yes
  vars:
    backup_dir: "{{ lookup('env', 'BACKUP_DIR') }}"

  tasks:
    - name: Find available backups
      find:
        paths: /root/deployment_backups/
        pattern: "config_backup.tar.gz"
        file_type: file
      register: available_backups

    - name: Display available backups
      debug:
        msg: "Available backups: {{ available_backups.files | map(attribute='path') | list }}"

    - name: Require backup directory parameter
      fail:
        msg: "Please specify BACKUP_DIR, e.g.: -e 'BACKUP_DIR=/root/deployment_backups/1234567890'"
      when: backup_dir == ""

    - name: Stop all services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - isc-dhcp-server
        - tftpd-hpa
        - nfs-kernel-server
        - apt-cacher-ng
        - cockpit

    - name: Restore from backup
      unarchive:
        src: "{{ backup_dir }}/config_backup.tar.gz"
        dest: /
        remote_src: yes

    - name: Restart services
      systemd:
        name: "{{ item }}"
        state: started
      loop:
        - isc-dhcp-server
        - tftpd-hpa
        - nfs-kernel-server
        - apt-cacher-ng
        - cockpit

    - name: Rollback complete
      debug:
        msg: "✅ Rollback completed from {{ backup_dir }}"