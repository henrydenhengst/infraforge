---
- name: Rollback Deployment Server Configuration
  hosts: localhost
  become: yes
  vars:
    backup_dir: "{{ lookup('env', 'BACKUP_DIR') | default('latest') }}"

  tasks:
    - name: Find latest backup if 'latest' is specified
      find:
        paths: /root/deployment_backups/
        patterns: "config_backup.tar.gz"
        file_type: file
        depth: 2
      register: all_backups
      when: backup_dir == "latest"

    - name: Set latest backup directory
      set_fact:
        latest_backup_dir: "{{ all_backups.files | map(attribute='path') | first | dirname }}"
      when: backup_dir == "latest" and all_backups.files | length > 0

    - name: Use latest backup
      set_fact:
        backup_dir: "{{ latest_backup_dir }}"
      when: backup_dir == "latest" and latest_backup_dir is defined

    - name: Display available backups
      debug:
        msg: "Available backups: {{ all_backups.files | map(attribute='path') | map('dirname') | list }}"
      when: backup_dir == "latest"

    - name: Fail if no backup found
      fail:
        msg: "No backup found in /root/deployment_backups/"
      when: backup_dir == "latest" and (all_backups.files | length == 0)

    - name: Confirm backup directory
      debug:
        msg: "Using backup: {{ backup_dir }}"

    - name: Verify backup exists
      stat:
        path: "{{ backup_dir }}/config_backup.tar.gz"
      register: backup_file
      failed_when: not backup_file.stat.exists

    - name: Stop all services
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - isc-dhcp-server
        - tftpd-hpa
        - nfs-kernel-server
        - apt-cacher-ng
        - cockpit
      ignore_errors: yes

    - name: Restore from backup
      unarchive:
        src: "{{ backup_dir }}/config_backup.tar.gz"
        dest: /
        remote_src: yes

    - name: Restart all services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - isc-dhcp-server
        - tftpd-hpa
        - nfs-kernel-server
        - apt-cacher-ng
        - cockpit

    - name: Rollback complete
      debug:
        msg: "✅ Rollback completed from {{ backup_dir }}"