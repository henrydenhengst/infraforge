[defaults]
# Inventory and paths
inventory = /etc/ansible/hosts
host_key_checking = False
timeout = 30
gathering = smart
fact_caching = memory
fact_caching_timeout = 3600

# Template en vars
template_vars_path = templates:./templates:/etc/ansible/templates
vars_plugins_enabled = host_group_vars,community.general

# Output en logging
stdout_callback = yaml
stderr_callback = yaml
display_skipped_hosts = False
display_ok_hosts = False
display_failed_hosts = True
display_args_epilogue = True

# Performance
forks = 20
pipelining = True
strategy = free
strategy_plugins = /usr/share/ansible/plugins/strategy

# Roles en plugins
roles_path = roles:./roles:/etc/ansible/roles
library_plugins = library:./library:/usr/share/ansible/plugins/library
filter_plugins = filter_plugins:./filter_plugins:/usr/share/ansible/plugins/filter

# SSH optimalisatie
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
pipelining = True
scp_if_ssh = smart

[colors]
# Kleuren uitschakelen voor logs (optioneel)
# highlight = white
# verbose = blue
# ok = green
# changed = yellow
# diff_add = green
# diff_remove = red