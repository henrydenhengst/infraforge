---
- name: Full Deployment Server Configuration - Production Ready v3.0
  hosts: localhost
  become: yes
  vars:
    network_config: "{{ lookup('file', '/etc/deployment_server_network.yml') | from_yaml }}"
    internal_interface: "{{ network_config.internal_interface }}"
    upstream_interface: "{{ network_config.upstream_interface }}"
    internal_subnet: "{{ network_config.internal_subnet }}"
    internal_netmask: "{{ network_config.internal_netmask }}"
    internal_broadcast: "{{ network_config.internal_broadcast }}"
    internal_network: "{{ network_config.internal_network }}"
    internal_prefix: "{{ network_config.internal_prefix }}"
    dhcp_range_start: "{{ network_config.dhcp_range_start }}"
    dhcp_range_end: "{{ network_config.dhcp_range_end }}"
    dhcp_router: "{{ network_config.dhcp_router }}"
    dns_servers: "{{ network_config.dns_servers }}"
    backup_dir: "/root/deployment_backups/{{ ansible_date_time.epoch }}"
    drbl_answer_file: "/tmp/drbl_answer_{{ ansible_date_time.epoch }}.txt"
    
    # Monitoring & Alerting
    admin_email: "admin@{{ ansible_domain | default('deployment.local') }}"
    enable_monitoring: true
    prometheus_node_exporter: false

  pre_tasks:
    - name: Verify network configuration exists
      stat:
        path: /etc/deployment_server_network.yml
      register: network_config_file
      failed_when: not network_config_file.stat.exists

    - name: Validate required variables
      assert:
        that:
          - internal_interface | length > 0
          - upstream_interface | length > 0
          - dhcp_router | ipaddr
          - internal_subnet | ipaddr
        fail_msg: "Required network variables are missing or invalid"

  tasks:
    # ============================================
    # 1. COMPREHENSIVE BACKUP
    # ============================================
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0700'

    - name: Backup all relevant configuration directories
      archive:
        path:
          - /etc/dhcp
          - /etc/default/isc-dhcp-server
          - /etc/default/tftpd-hpa
          - /etc/exports
          - /etc/apt-cacher-ng
          - /etc/drbl
          - /etc/netplan
          - /etc/iptables
          - /etc/cockpit
        dest: "{{ backup_dir }}/full_config_backup.tar.gz"
        format: gz
        remove: no
      ignore_errors: yes

    - name: Save package list for potential rollback
      command: dpkg --get-selections > {{ backup_dir }}/packages_before.txt
      ignore_errors: yes

    # ============================================
    # 2. SYSTEM PACKAGES INSTALLATION
    # ============================================
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install core packages with specific versions
      apt:
        name:
          - drbl
          - clonezilla
          - clonezilla-live
          - apt-cacher-ng
          - tftpd-hpa
          - nfs-kernel-server
          - isc-dhcp-server
          - iptables-persistent
          - cockpit
          - memtest86+
          - memtest86
          - smartmontools
          - ansible
          - make
          - gcc
          - liblzma-dev
          - genisoimage
          - syslinux
          - syslinux-common
          - pxelinux
          - mtools
          - isolinux
          - xorriso
          - ufw
        state: present
        update_cache: yes

    - name: Install monitoring packages (optional)
      apt:
        name:
          - prometheus-node-exporter
        state: present
      when: enable_monitoring and prometheus_node_exporter

    # ============================================
    # 3. NETWORK CONFIGURATION (MET ROLLBACK)
    # ============================================
    - name: Check if internal interface already has correct IP
      command: 
        cmd: "ip -4 addr show {{ internal_interface }} | grep -q '{{ dhcp_router }}/{{ internal_prefix }}'"
      register: ip_configured
      ignore_errors: yes
      changed_when: false

    - name: Configure static IP on internal interface
      block:
        - name: Backup current netplan config
          copy:
            src: /etc/netplan/
            dest: "{{ backup_dir }}/netplan_before/"
            remote_src: yes
          ignore_errors: yes

        - name: Create netplan configuration
          copy:
            dest: /etc/netplan/99-deployment-server.yaml
            content: |
              network:
                version: 2
                renderer: networkd
                ethernets:
                  {{ internal_interface }}:
                    addresses:
                      - {{ dhcp_router }}/{{ internal_prefix }}
                    dhcp4: no
            mode: '0644'
          register: netplan_config

        - name: Validate netplan configuration
          command: netplan try --timeout 30
          register: netplan_test
          failed_when: netplan_test.rc != 0
          
        - name: Apply netplan configuration
          command: netplan apply
          when: netplan_test.rc == 0
          
        - name: Wait for interface to stabilize
          wait_for:
            timeout: 10
      when: ip_configured is failed

    # ============================================
    # 4. DHCP CONFIGURATION (MET SYNTAX CHECK)
    # ============================================
    - name: Configure DHCP server
      copy:
        dest: /etc/dhcp/dhcpd.conf
        content: |
          # DHCP Configuration for PXE Boot - Generated by Ansible v3.0
          # Generated: {{ ansible_date_time.iso8601 }}
          
          option domain-name "deployment.local";
          option domain-name-servers {{ dns_servers | join(', ') }};
          default-lease-time 600;
          max-lease-time 7200;
          authoritative;
          log-facility local7;
          
          subnet {{ internal_network }} netmask {{ internal_netmask }} {
              range {{ dhcp_range_start }} {{ dhcp_range_end }};
              option routers {{ dhcp_router }};
              option broadcast-address {{ internal_broadcast }};
              
              # PXE Boot configuration
              next-server {{ dhcp_router }};
              filename "pxelinux.0";
              
              # UEFI support (verbeterd voor alle architecturen)
              option arch code 93 = unsigned integer 16;
              
              if option arch = 00:07 {
                  filename "netboot.xyz.efi";
              } elsif option arch = 00:09 {
                  filename "netboot.xyz.efi";
              } elsif option arch = 00:0b {
                  filename "netboot.xyz.efi";
              } else {
                  filename "pxelinux.0";
              }
          }
        mode: '0644'
      register: dhcp_config

    - name: Validate DHCP configuration syntax
      command: dhcpd -t -cf /etc/dhcp/dhcpd.conf
      register: dhcp_test
      failed_when: dhcp_test.rc != 0

    - name: Configure DHCP interface
      lineinfile:
        path: /etc/default/isc-dhcp-server
        regexp: '^INTERFACESv4='
        line: 'INTERFACESv4="{{ internal_interface }}"'
      notify: restart_services

    # ============================================
    # 5. TFTP CONFIGURATION
    # ============================================
    - name: Create TFTP root directory
      file:
        path: /srv/tftp
        state: directory
        mode: '0755'
        owner: tftp
        group: nogroup

    - name: Configure TFTP securely
      copy:
        dest: /etc/default/tftpd-hpa
        content: |
          TFTP_USERNAME="tftp"
          TFTP_DIRECTORY="/srv/tftp"
          TFTP_ADDRESS="{{ dhcp_router }}:69"
          TFTP_OPTIONS="--secure --create --blocksize 1468 --verbose"
        mode: '0644'
      notify: restart_services

    - name: Copy PXE bootloaders
      block:
        - name: Ensure syslinux is installed
          apt:
            name: syslinux-common
            state: present
          retries: 3
          delay: 5

        - name: Copy syslinux modules
          copy:
            src: "{{ item.src }}"
            dest: "{{ item.dest }}"
            remote_src: yes
          loop:
            - { src: "/usr/lib/syslinux/modules/bios/ldlinux.c32", dest: "/srv/tftp/ldlinux.c32" }
            - { src: "/usr/lib/syslinux/modules/bios/menu.c32", dest: "/srv/tftp/menu.c32" }
            - { src: "/usr/lib/syslinux/modules/bios/libutil.c32", dest: "/srv/tftp/libutil.c32" }
            - { src: "/usr/lib/syslinux/pxelinux.0", dest: "/srv/tftp/pxelinux.0" }
          ignore_errors: yes
      rescue:
        - name: Install syslinux from alternative location
          apt:
            name: syslinux
            state: present
          notify: restart_services

    # ============================================
    # 6. NFS CONFIGURATION
    # ============================================
    - name: Create NFS share directory
      file:
        path: /home/partimag
        state: directory
        mode: '0755'
        owner: nobody
        group: nogroup

    - name: Configure NFS exports securely
      lineinfile:
        path: /etc/exports
        line: '/home/partimag {{ internal_subnet }}(rw,sync,no_subtree_check,insecure,root_squash)'
        create: yes
      notify: restart_services

    # ============================================
    # 7. APT CACHER-NG (SECURE)
    # ============================================
    - name: Configure Apt-Cacher-NG securely
      copy:
        dest: /etc/apt-cacher-ng/acng.conf
        content: |
          # Security-hardened Apt-Cacher-NG Configuration
          # Generated: {{ ansible_date_time.iso8601 }}
          
          CacheDir: /var/cache/apt-cacher-ng
          LogDir: /var/log/apt-cacher-ng
          Port: 3142
          BindAddress: {{ dhcp_router }}
          
          # Allow only official Debian/Ubuntu repositories
          Remap-debrep: file:deb_mirror*.gz /debian/ file:backends_debian
          Remap-debsec: file:deb_mirror*.gz /debian-security/ file:backends_debian
          Remap-uburep: file:ubuntu_mirrors /ubuntu/ file:backends_ubuntu
          
          # Strict pass-through pattern
          PassThroughPattern: ^(security|deb)\.debian\.org|archive\.ubuntu\.com|deb\.debian\.net
          
          # Performance & security
          MaxAge: 30
          MaxCacheUsage: 80
          MaxCacheAge: 30
          MaxWait: 30
          MaxConnectionRate: 10
          VerboseLog: 1
          Debug: 0
          MaxThreads: 20
          SocketPath: /var/cache/apt-cacher-ng/_socket
          PidFile: /var/run/apt-cacher-ng/pid
        mode: '0644'
      notify: restart_services

    # ============================================
    # 8. NAT & IPTABLES (IDEMPOTENT)
    # ============================================
    - name: Enable IP forwarding
      sysctl:
        name: "{{ item }}"
        value: '1'
        sysctl_set: yes
        state: present
        reload: yes
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding

    - name: Check if NAT rule exists
      command: iptables -t nat -C POSTROUTING -s {{ internal_subnet }} -o {{ upstream_interface }} -j MASQUERADE
      register: nat_exists
      ignore_errors: yes
      changed_when: false

    - name: Add NAT rule if not exists
      iptables:
        table: nat
        chain: POSTROUTING
        source: "{{ internal_subnet }}"
        out_interface: "{{ upstream_interface }}"
        jump: MASQUERADE
        comment: "Ansible-managed NAT for deployment network"
      when: nat_exists is failed

    - name: Add forwarding rules
      block:
        - name: Add forward accept rule
          iptables:
            chain: FORWARD
            in_interface: "{{ internal_interface }}"
            out_interface: "{{ upstream_interface }}"
            jump: ACCEPT
        - name: Add established connections rule
          iptables:
            chain: FORWARD
            in_interface: "{{ upstream_interface }}"
            out_interface: "{{ internal_interface }}"
            ctstate: ESTABLISHED,RELATED
            jump: ACCEPT
      when: nat_exists is failed

    - name: Save iptables rules persistently
      shell: |
        mkdir -p /etc/iptables
        iptables-save > /etc/iptables/rules.v4
        ip6tables-save > /etc/iptables/rules.v6
      args:
        creates: /etc/iptables/rules.v4

    # ============================================
    # 9. NETBOOT.XYZ (MET FALLBACK)
    # ============================================
    - name: Clone netboot.xyz repository
      git:
        repo: https://github.com/netbootxyz/netboot.xyz.git
        dest: /opt/netboot.xyz
        version: master
        depth: 1
        force: no
      register: netboot_clone
      ignore_errors: yes

    - name: Build netboot.xyz with fallback
      block:
        - name: Attempt to build netboot.xyz
          command: make build
          args:
            chdir: /opt/netboot.xyz
          register: netboot_build
          timeout: 300
          changed_when: "'already' not in netboot_build.stdout"
          
        - name: Copy built netboot.xyz files to TFTP
          synchronize:
            src: /opt/netboot.xyz/
            dest: /srv/tftp/
            delete: no
            rsync_opts:
              - "--include=*.kpxe"
              - "--include=*.efi"
              - "--include=*.lkrn"
              - "--include=ipxe/"
              - "--exclude=*"
      rescue:
        - name: Download pre-built netboot.xyz binaries (fallback)
          get_url:
            url: "{{ item.url }}"
            dest: "{{ item.dest }}"
            mode: '0644'
          loop:
            - { url: "https://boot.netboot.xyz/ipxe/netboot.xyz.efi", dest: "/srv/tftp/netboot.xyz.efi" }
            - { url: "https://boot.netboot.xyz/ipxe/netboot.xyz.kpxe", dest: "/srv/tftp/netboot.xyz.kpxe" }
            - { url: "https://boot.netboot.xyz/ipxe/netboot.xyz.lkrn", dest: "/srv/tftp/netboot.xyz.lkrn" }
          when: netboot_clone is failed

    # ============================================
    # 10. DRBL SETUP (VERSIE-SPECIFIEK)
    # ============================================
    - name: Detect DRBL version
      command: drblsrv --version
      register: drbl_version_output
      ignore_errors: yes
      changed_when: false

    - name: Parse DRBL version
      set_fact:
        drbl_version: "{{ drbl_version_output.stdout | regex_replace('^[^0-9]*([0-9]+\\.[0-9]+).*$', '\\1') }}"
      when: drbl_version_output is success

    - name: Validate DRBL version compatibility
      fail:
        msg: "DRBL version {{ drbl_version }} is not compatible. Minimum required: 2.6"
      when: drbl_version_output is failed or (drbl_version | float < 2.6)

    - name: Check if DRBL is already configured
      stat:
        path: /etc/drbl/drblrc
      register: drbl_config

    - name: Create DRBL answer file (versie-specifiek)
      template:
        src: "drbl_answer_{{ drbl_version | regex_replace('\\.', '') }}.j2"
        dest: "{{ drbl_answer_file }}"
        mode: '0600'
      vars:
        drbl_major: "{{ drbl_version.split('.')[0] | int }}"
        drbl_minor: "{{ drbl_version.split('.')[1] | int }}"
      when: not drbl_config.stat.exists
      ignore_errors: yes

    - name: Initialize DRBL server
      shell: /opt/drbl/sbin/drblsrv -i
      args:
        stdin: "{{ drbl_answer_file }}"
      when: not drbl_config.stat.exists and drbl_answer_file is defined
      register: drblsrv_output
      timeout: 600
      failed_when: 
        - drblsrv_output.rc != 0
        - "'ERROR' in drblsrv_output.stderr | default('')"
      changed_when: "'already' not in drblsrv_output.stdout | default('')"

    - name: Push DRBL configuration
      shell: /opt/drbl/sbin/drblpush -i
      args:
        stdin: "{{ drbl_answer_file }}"
      when: not drbl_config.stat.exists and drbl_answer_file is defined
      register: drblpush_output
      timeout: 300
      failed_when: drblpush_output.rc != 0

    - name: Clean up DRBL answer file
      file:
        path: "{{ drbl_answer_file }}"
        state: absent
      when: drbl_answer_file is defined

    # ============================================
    # 11. TEST CLONEZILLA FUNCTIONALITY
    # ============================================
    - name: Test NFS mount for Clonezilla
      block:
        - name: Create test mount point
          file:
            path: /mnt/test_clonezilla
            state: directory

        - name: Attempt to mount NFS share
          command: mount -t nfs localhost:/home/partimag /mnt/test_clonezilla
          register: nfs_mount_test
          failed_when: false

        - name: Verify NFS is working
          stat:
            path: /mnt/test_clonezilla
          register: nfs_check

        - name: Clean up test mount
          command: umount /mnt/test_clonezilla
          ignore_errors: yes
          
        - name: Remove test mount point
          file:
            path: /mnt/test_clonezilla
            state: absent
      tags: test

    # ============================================
    # 12. SMART MONITORING MET EMAIL
    # ============================================
    - name: Configure smartd with email alerts
      copy:
        dest: /etc/smartd.conf
        content: |
          # SMART monitoring for all disks - Generated {{ ansible_date_time.iso8601 }}
          DEVICESCAN -a -o on -S on -s (S/../.././02|L/../../7/03) -m {{ admin_email }} -M diminishing -M test
        mode: '0644'
      notify: restart_services

    - name: Install mail utilities for alerts
      apt:
        name:
          - postfix
          - mailutils
        state: present
      when: admin_email != "root"

    # ============================================
    # 13. COCKPIT (MET HTTPS EN IDEMPOTENT CERT)
    # ============================================
    - name: Generate Cockpit self-signed certificate (only once)
      shell: |
        if [ ! -f /etc/cockpit/ws-cert.pem ]; then
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /etc/cockpit/ws-key.pem \
            -out /etc/cockpit/ws-cert.pem \
            -subj '/CN={{ dhcp_router }}/O=Deployment Server/C=NL'
          chmod 640 /etc/cockpit/ws-key.pem
          chmod 644 /etc/cockpit/ws-cert.pem
        fi
      args:
        creates: /etc/cockpit/ws-cert.pem
      notify: restart_services

    - name: Configure Cockpit for HTTPS only
      copy:
        dest: /etc/cockpit/cockpit.conf
        content: |
          [WebService]
          Origins = https://{{ dhcp_router }}:9090 https://localhost:9090 https://{{ ansible_hostname }}:9090
          Protocol = https
          AllowUnencrypted = false
        
          [Log]
          Level = info
        mode: '0644'
      notify: restart_services

    # ============================================
    # 14. UFW FIREWALL (MET SSH PROTECTION)
    # ============================================
    - name: Configure UFW firewall safely
      block:
        - name: Reset UFW to defaults
          ufw:
            state: reset
          ignore_errors: yes

        - name: Set default policies
          ufw:
            direction: "{{ item.direction }}"
            policy: "{{ item.policy }}"
          loop:
            - { direction: incoming, policy: deny }
            - { direction: outgoing, policy: allow }

        - name: Allow SSH (prevent lockout)
          ufw:
            rule: allow
            port: '22'
            proto: tcp

        - name: Allow essential services
          ufw:
            rule: allow
            port: "{{ item }}"
            proto: tcp
          loop:
            - '9090'   # Cockpit HTTPS
            - '3142'   # Apt-Cacher-NG
            
  