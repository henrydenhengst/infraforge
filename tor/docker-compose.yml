version: '3.8'

services:
  # Tor Middle Relay - Ondersteunt het netwerk zonder Exit-verkeer
  tor-relay:
    image: r3bo0tbx1/tor-guard-relay:latest
    container_name: tor-relay
    restart: unless-stopped
    environment:
      - OR_PORT=9001
      - NICKNAME=LinuxCafeHaarlem
      - CONTACT_INFO=lch@linuxcafehaarlem.nl
    ports:
      - "9001:9001"
    # ExitPolicy staat standaard op 'reject *:*' in de meeste images, 
    # maar controleer dit in de logbestanden.
    networks:
      - privacy-net

  # I2P Router - Voor het versterken van het P2P netwerk
  i2p:
    image: i2p/i2p:latest
    container_name: i2p-router
    restart: unless-stopped
    ports:
      - "7657:7657" # Console UI
      - "7654:7654" # I2CP
      - "8082:8082" # HTTP Proxy
    volumes:
      - ./i2p-data:/var/lib/i2p
    networks:
      - privacy-net

  # IPFS Kubo - Gedecentraliseerde opslag (beperkte resources)
  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs-node
    restart: unless-stopped
    environment:
      - IPFS_PATH=/data/ipfs
    ports:
      - "4001:4001" # Swarm
      - "8080:8080" # Gateway
    volumes:
      - ./ipfs-data:/data/ipfs
    deploy:
      resources:
        limits:
          memory: 512M # Voorkom overmatig gebruik
    networks:
      - privacy-net

networks:
  privacy-net:
    driver: bridge
