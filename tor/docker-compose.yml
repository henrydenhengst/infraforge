version: '3.8'

services:
  tor-relay:
    image: r3bo0tbx1/tor-guard-relay:latest
    container_name: tor-relay
    restart: unless-stopped
    environment:
      - OR_PORT=9001
      - NICKNAME=LinuxCafeHaarlem
      - CONTACT_INFO=info@linuxcafehaarlem.nl
    ports:
      - "9001:9001"
    networks:
      - privacy-net

  i2p:
    image: i2p/i2p:latest
    container_name: i2p-router
    restart: unless-stopped
    ports:
      - "7657:7657"
      - "7654:7654"
      - "8082:8082"
    volumes:
      - ./i2p-data:/var/lib/i2p
    networks:
      - privacy-net

  ipfs:
    image: ipfs/kubo:latest
    container_name: ipfs-node
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "8080:8080"
      - "5001:5001"
    volumes:
      - ./ipfs-data:/data/ipfs
    networks:
      - privacy-net

  matrix:
    image: matrixdotorg/synapse:latest
    container_name: matrix-synapse
    restart: unless-stopped
    ports:
      - "8008:8008"
    volumes:
      - ./matrix-data:/data
    networks:
      - privacy-net

  nym-node:
    image: nymtech/nym-node:latest
    container_name: nym-mixnode
    restart: unless-stopped
    ports:
      - "1789:1789"
    volumes:
      - ./nym-data:/root/.nym
    networks:
      - privacy-net

  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    ports:
      - "8384:8384"
      - "22000:22000"
    volumes:
      - ./syncthing-data:/var/syncthing
    networks:
      - privacy-net

  monero:
    image: monerod:latest
    container_name: monero-node
    restart: unless-stopped
    ports:
      - "18080:18080"
    volumes:
      - ./monero-data:/home/monero/.bitmonero
    networks:
      - privacy-net

networks:
  privacy-net:
    driver: bridge
