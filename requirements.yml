# =============================================================================
# ANSIBLE COLLECTIONS EN ROLES AFHANKELIJKHEDEN
# =============================================================================
# Dit bestand installeert alle benodigde collections en roles voor:
# - AI/ML tools (Ollama, LocalAI, Qdrant, ChromaDB)
# - Media servers (Jellyfin, Plex, Immich)
# - Databases (PostgreSQL, Redis, MongoDB, ClickHouse)
# - Monitoring (Prometheus, Grafana, Loki)
# - Security (Wazuh, Authentik, Vault)
# - En vele anderen...
# =============================================================================

