# -----------------------------------------------------------------------------
# GEBRUIKSINSTRUCTIES
# -----------------------------------------------------------------------------
# Installeer alle dependencies:
# $ ansible-galaxy collection install -r requirements.yml
# $ ansible-galaxy role install -r requirements.yml
#
# Voor AI/ML tools (Ollama, LocalAI, Qdrant):
# $ ansible-galaxy role install andrewrothstein.ollama
#
# Voor media servers (Jellyfin, Plex, Immich):
# $ ansible-galaxy role install andrewrothstein.jellyfin
#
# Voor databases (PostgreSQL, MongoDB, ClickHouse):
# $ ansible-galaxy collection install community.postgresql
#
# Voor monitoring (Prometheus, Grafana):
# $ ansible-galaxy collection install community.prometheus

