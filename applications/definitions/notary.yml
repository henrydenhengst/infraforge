---
# =============================================================================
# SYFT - SOFTWARE BILL OF MATERIALS
# =============================================================================
# Beschrijving: Generate Software Bill of Materials (SBOM)
# Website: https://github.com/anchore/syft
# =============================================================================

application:
  name: syft
  version: 0.100.0
  description: "Syft - Software Bill of Materials"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: security-team
    contact: security@company.local
    slack: "#security"
    documentation: "https://github.com/anchore/syft"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 5
        performance: ssd
        backup_required: false
        mount_path: /data
        
  network_requirements:
    vlans:
      - security
      - internal
    ports: []
    dns: []
    
  container:
    image: anchore/syft:latest
    restart: "no"
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: SYFT_CHECK_FOR_APP_UPDATE
      value: "false"
      secret: false
    - name: SYFT_QUIET
      value: "false"
      secret: false
      
  health_checks:
    liveness:
      type: exec
      command: ["syft", "version"]