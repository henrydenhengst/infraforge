---
# =============================================================================
# PEERTUBE - GEDECENTRALISEERD VIDEO-PLATFORM
# =============================================================================
# Beschrijving: Gedecentraliseerd video-hostingsplatform
# Website: https://joinpeertube.org
# =============================================================================

application:
  name: peertube
  version: 6.0.0
  description: "PeerTube - Gedecentraliseerd video-platform"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: media-team
    contact: media@company.local
    slack: "#media"
    documentation: "https://docs.joinpeertube.org"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 100
        performance: ssd
        backup_required: true
        mount_path: /data
      - name: videos
        size_gb: 500
        performance: hdd
        backup_required: true
        mount_path: /videos
        
  network_requirements:
    vlans:
      - media
      - dmz
    ports:
      - container: 9000
        host: 9000
        protocol: tcp
        public: true
        description: "PeerTube web interface"
    dns:
      - "video.{{ domain }}"
      - "peertube.{{ domain }}"
      
  container:
    image: chocobozzz/peertube:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  environment_variables:
    - name: PEERTUBE_WEBSERVER_HOSTNAME
      value: "peertube.{{ domain }}"
      secret: false
    - name: PEERTUBE_WEBSERVER_PORT
      value: "443"
      secret: false
    - name: PEERTUBE_WEBSERVER_HTTPS
      value: "true"
      secret: false
    - name: PEERTUBE_DB_HOSTNAME
      value: "postgres"
      secret: false
    - name: PEERTUBE_DB_USERNAME
      value: "peertube"
      secret: false
    - name: PEERTUBE_DB_PASSWORD
      value: "{{ vault_peertube_password }}"
      secret: true
    - name: PEERTUBE_DB_NAME
      value: "peertube"
      secret: false
    - name: PEERTUBE_REDIS_HOSTNAME
      value: "redis"
      secret: false
    - name: PEERTUBE_REDIS_PORT
      value: "6379"
      secret: false
    - name: PEERTUBE_ADMIN_EMAIL
      value: "admin@{{ domain }}"
      secret: false
    - name: PEERTUBE_SMTP_HOSTNAME
      value: "smtp.{{ domain }}"
      secret: false
    - name: PEERTUBE_SMTP_PORT
      value: "587"
      secret: false
    - name: PEERTUBE_SMTP_USERNAME
      value: "peertube@{{ domain }}"
      secret: false
    - name: PEERTUBE_SMTP_PASSWORD
      value: "{{ vault_smtp_password }}"
      secret: true
    - name: PEERTUBE_SMTP_TLS
      value: "true"
      secret: false
    - name: PEERTUBE_SMTP_FROM
      value: "peertube@{{ domain }}"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /api/v1/server/health
      port: 9000