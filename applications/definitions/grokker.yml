---
# =============================================================================
# BOOKSTACK - DOCUMENTATIE EN PERSONEELSHANDBOEK
# =============================================================================
# Beschrijving: Documentatie en personeelshandboek
# Website: https://www.bookstackapp.com
# =============================================================================

application:
  name: bookstack
  version: 24.02.0
  description: "BookStack - Documentatie en wiki"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: documentation-team
    contact: docs@company.local
    slack: "#docs"
    documentation: "https://www.bookstackapp.com/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: config
        size_gb: 1
        performance: ssd
        backup_required: true
        mount_path: /config
      - name: uploads
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /uploads
      - name: storage
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /storage
        
  network_requirements:
    vlans:
      - documentation
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "BookStack web interface"
    dns:
      - "wiki.{{ domain }}"
      - "bookstack.{{ domain }}"
      - "docs.{{ domain }}"
      
  container:
    image: linuxserver/bookstack:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: PUID
      value: "1000"
      secret: false
    - name: PGID
      value: "1000"
      secret: false
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
    - name: APP_URL
      value: "https://wiki.{{ domain }}"
      secret: false
    - name: DB_HOST
      value: "mysql"
      secret: false
    - name: DB_PORT
      value: "3306"
      secret: false
    - name: DB_DATABASE
      value: "bookstack"
      secret: false
    - name: DB_USERNAME
      value: "bookstack"
      secret: false
    - name: DB_PASSWORD
      value: "{{ vault_bookstack_password }}"
      secret: true
    - name: MAIL_DRIVER
      value: "smtp"
      secret: false
    - name: MAIL_HOST
      value: "smtp.{{ domain }}"
      secret: false
    - name: MAIL_PORT
      value: "587"
      secret: false
    - name: MAIL_USERNAME
      value: "bookstack@{{ domain }}"
      secret: false
    - name: MAIL_PASSWORD
      value: "{{ vault_smtp_password }}"
      secret: true
    - name: MAIL_ENCRYPTION
      value: "tls"
      secret: false
    - name: MAIL_FROM_NAME
      value: "{{ company_name }} Wiki"
      secret: false
    - name: MAIL_FROM_ADDRESS
      value: "bookstack@{{ domain }}"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80