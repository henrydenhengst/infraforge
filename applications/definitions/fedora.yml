---
# =============================================================================
# FEDORA - LINUX VOOR DEVELOPERS
# =============================================================================
# Beschrijving: Cutting-edge Linux distributie voor developers
# Website: https://fedoraproject.org
# =============================================================================

application:
  name: fedora
  version: 39
  description: "Fedora - Linux voor developers"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: platform-team
    contact: platform@company.local
    slack: "#platform"
    documentation: "https://docs.fedoraproject.org"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - os
      - internal
    ports: []
    dns: []
    
  container:
    image: fedora:39
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  command: ["tail", "-f", "/dev/null"]
  
  environment_variables:
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
      
  health_checks:
    liveness:
      type: exec
      command: ["cat", "/etc/os-release"]