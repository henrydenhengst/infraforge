---
# =============================================================================
# MALTRAIL - MALICIOUS TRAFFIC DETECTION
# =============================================================================
# Beschrijving: Malicious traffic detection system
# Website: https://github.com/stamparm/maltrail
# =============================================================================

application:
  name: maltrail
  version: 0.52
  description: "Maltrail - Malicious traffic detection"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: security-team
    contact: security@company.local
    slack: "#security"
    documentation: "https://github.com/stamparm/maltrail"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /data
      - name: logs
        size_gb: 10
        performance: ssd
        backup_required: false
        mount_path: /logs
        
  network_requirements:
    vlans:
      - security
      - management
    ports:
      - container: 8338
        host: 8338
        protocol: tcp
        public: false
        description: "Maltrail web interface"
      - container: 3333
        host: 3333
        protocol: tcp
        public: false
        description: "Maltrail sensor"
    dns:
      - "maltrail.{{ domain }}"
      
  container:
    image: trafex/maltrail:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
        
  environment_variables:
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
    - name: MALTRIAIL_USER
      value: "admin"
      secret: false
    - name: MALTRIAIL_PASSWORD
      value: "{{ vault_maltrail_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 8338