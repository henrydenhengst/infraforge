---
# =============================================================================
# WHISPER-ASR - SPraak-NAAR-TEKST TRANSCRIPTIE
# =============================================================================
# Beschrijving: Spraak-naar-tekst transcriptie op basis van OpenAI Whisper
# Website: https://github.com/ahmetoner/whisper-asr-webservice
# =============================================================================

application:
  name: whisper-asr
  version: 1.0.0
  description: "Whisper-ASR - Spraak-naar-tekst transcriptie"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: ai-team
    contact: ai@company.local
    slack: "#ai"
    documentation: "https://github.com/ahmetoner/whisper-asr-webservice"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 4
      min_ram_gb: 8
      recommended_cpu_cores: 8
      recommended_ram_gb: 16
      gpu_required: true
      
    storage:
      - name: models
        size_gb: 10
        performance: ssd
        backup_required: false
        mount_path: /root/.cache/whisper
      - name: uploads
        size_gb: 50
        performance: ssd
        backup_required: false
        mount_path: /uploads
        
  network_requirements:
    vlans:
      - ai
      - internal
    ports:
      - container: 9001
        host: 9001
        protocol: tcp
        public: false
        description: "Whisper API"
    dns:
      - "whisper.{{ domain }}"
      - "asr.{{ domain }}"
      
  container:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    gpu_support: true
    resources:
      limits:
        cpu: "8"
        memory: 16Gi
      requests:
        cpu: "4"
        memory: 8Gi
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]
              
  environment_variables:
    - name: ASR_MODEL
      value: "base"
      secret: false
    - name: ASR_ENGINE
      value: "openai_whisper"
      secret: false
    - name: ASR_MODEL_PATH
      value: "/root/.cache/whisper"
      secret: false
    - name: UPLOAD_FOLDER
      value: "/uploads"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 9001