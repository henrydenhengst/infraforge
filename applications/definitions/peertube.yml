---
# =============================================================================
# SONARR - TV-SERIE MANAGER
# =============================================================================
# Beschrijving: TV-serie manager voor geautomatiseerde downloads
# Website: https://sonarr.tv
# =============================================================================

application:
  name: sonarr
  version: 4.0.0
  description: "Sonarr - TV-serie manager"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: media-team
    contact: media@company.local
    slack: "#media"
    documentation: "https://wiki.servarr.com/Sonarr"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: config
        size_gb: 1
        performance: ssd
        backup_required: true
        mount_path: /config
      - name: tv
        size_gb: 2000
        performance: hdd
        backup_required: false
        mount_path: /tv
      - name: downloads
        size_gb: 500
        performance: hdd
        backup_required: false
        mount_path: /downloads
        
  network_requirements:
    vlans:
      - media
      - internal
    ports:
      - container: 8989
        host: 8989
        protocol: tcp
        public: false
        description: "Sonarr web interface"
    dns:
      - "sonarr.{{ domain }}"
      - "tv.{{ domain }}"
      
  container:
    image: linuxserver/sonarr:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: PUID
      value: "1000"
      secret: false
    - name: PGID
      value: "1000"
      secret: false
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 8989