---
# =============================================================================
# SUITECRM - ENTERPRISE SALESFORCE ALTERNATIEF
# =============================================================================
# Beschrijving: Enterprise Salesforce alternatief
# Website: https://suitecrm.com
# =============================================================================

application:
  name: suitecrm
  version: 8.5.0
  description: "SuiteCRM - Enterprise CRM"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: sales-team
    contact: sales@company.local
    slack: "#sales"
    documentation: "https://docs.suitecrm.com"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /var/www/html
      - name: uploads
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/upload
        
  network_requirements:
    vlans:
      - sales
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "SuiteCRM web interface"
    dns:
      - "crm.{{ domain }}"
      - "suitecrm.{{ domain }}"
      
  container:
    image: suitecrm/suitecrm:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  environment_variables:
    - name: SUITECRM_DB_HOST
      value: "mysql"
      secret: false
    - name: SUITECRM_DB_USER
      value: "suitecrm"
      secret: false
    - name: SUITECRM_DB_PASSWORD
      value: "{{ vault_suitecrm_password }}"
      secret: true
    - name: SUITECRM_DB_NAME
      value: "suitecrm"
      secret: false
    - name: SUITECRM_URL
      value: "https://crm.{{ domain }}"
      secret: false
    - name: SUITECRM_ADMIN_USER
      value: "admin"
      secret: false
    - name: SUITECRM_ADMIN_PASSWORD
      value: "{{ vault_suitecrm_admin_password }}"
      secret: true
    - name: SUITECRM_ADMIN_EMAIL
      value: "admin@{{ domain }}"
      secret: false
    - name: SUITECRM_SMTP_HOST
      value: "smtp.{{ domain }}"
      secret: false
    - name: SUITECRM_SMTP_PORT
      value: "587"
      secret: false
    - name: SUITECRM_SMTP_USER
      value: "crm@{{ domain }}"
      secret: false
    - name: SUITECRM_SMTP_PASSWORD
      value: "{{ vault_smtp_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80