---
# =============================================================================
# PYLOD - DOWNLOADMANAGER VOOR ONE-CLICK HOSTERS
# =============================================================================
# Beschrijving: Downloadmanager voor one-click hosters
# Website: https://pyload.net
# =============================================================================

application:
  name: pyload
  version: 0.5.0
  description: "pyLoad - Downloadmanager voor one-click hosters"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: media-team
    contact: media@company.local
    slack: "#media"
    documentation: "https://pyload.net/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: config
        size_gb: 1
        performance: ssd
        backup_required: true
        mount_path: /config
      - name: downloads
        size_gb: 500
        performance: hdd
        backup_required: false
        mount_path: /downloads
        
  network_requirements:
    vlans:
      - media
      - internal
    ports:
      - container: 8000
        host: 8000
        protocol: tcp
        public: false
        description: "pyLoad web interface"
      - container: 7227
        host: 7227
        protocol: tcp
        public: false
        description: "pyLoad API"
    dns:
      - "pyload.{{ domain }}"
      
  container:
    image: linuxserver/pyload:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: PUID
      value: "1000"
      secret: false
    - name: PGID
      value: "1000"
      secret: false
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 8000