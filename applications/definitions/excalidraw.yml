---
# =============================================================================
# DOLIBARR POS - KASSA-INTERFACE
# =============================================================================
# Beschrijving: Kassa-interface gekoppeld aan Dolibarr ERP
# Website: https://www.dolibarr.org
# =============================================================================

application:
  name: dolibarr-pos
  version: 18.0.0
  description: "Dolibarr POS - Kassa-interface"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: retail-team
    contact: retail@company.local
    slack: "#retail"
    documentation: "https://wiki.dolibarr.org"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: documents
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /var/www/documents
      - name: scripts
        size_gb: 1
        performance: ssd
        backup_required: true
        mount_path: /var/www/scripts
        
  network_requirements:
    vlans:
      - retail
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "Dolibarr POS web interface"
    dns:
      - "pos.{{ domain }}"
      - "dolibarr-pos.{{ domain }}"
      
  container:
    image: dolibarr/dolibarr:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: DOLI_DB_HOST
      value: "mysql"
      secret: false
    - name: DOLI_DB_NAME
      value: "dolibarr_pos"
      secret: false
    - name: DOLI_DB_USER
      value: "dolibarr_pos"
      secret: false
    - name: DOLI_DB_PASSWORD
      value: "{{ vault_dolibarr_pos_password }}"
      secret: true
    - name: DOLI_ADMIN_LOGIN
      value: "admin"
      secret: false
    - name: DOLI_ADMIN_PASSWORD
      value: "{{ vault_dolibarr_pos_admin_password }}"
      secret: true
    - name: DOLI_URL_ROOT
      value: "https://pos.{{ domain }}"
      secret: false
    - name: PHP_INI_DATE_TIMEZONE
      value: "Europe/Amsterdam"
      secret: false
    - name: DOLI_MODULES
      value: "pos,facture,propal,commande,stock,produit"
      secret: false
    - name: DOLI_POS_ENABLE
      value: "1"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80