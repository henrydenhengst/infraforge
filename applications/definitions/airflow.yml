---
# =============================================================================
# REDPANDA - KAFKA-COMPATIBLE STREAMING
# =============================================================================
# Beschrijving: Kafka-compatible streaming platform
# Website: https://redpanda.com
# =============================================================================

application:
  name: redpanda
  version: 23.3.0
  description: "Redpanda - Kafka-compatible streaming"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: data-team
    contact: data@company.local
    slack: "#data"
    documentation: "https://docs.redpanda.com"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 100
        performance: ssd
        backup_required: true
        mount_path: /var/lib/redpanda/data
        
  network_requirements:
    vlans:
      - data
      - internal
    ports:
      - container: 9092
        host: 9092
        protocol: tcp
        public: false
        description: "Kafka API"
      - container: 9644
        host: 9644
        protocol: tcp
        public: false
        description: "Redpanda admin API"
      - container: 8081
        host: 8081
        protocol: tcp
        public: false
        description: "Schema registry"
    dns:
      - "redpanda.{{ domain }}"
      
  container:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  environment_variables:
    - name: REDPANDA_CLUSTER_ID
      value: "redpanda-cluster"
      secret: false
    - name: REDPANDA_NODE_ID
      value: "1"
      secret: false
    - name: REDPANDA_SEEDS
      value: "redpanda"
      secret: false
    - name: REDPANDA_KAFKA_ADVERTISED_LISTENERS
      value: "PLAINTEXT://redpanda:9092"
      secret: false
    - name: REDPANDA_RPC_ADVERTISED_LISTENERS
      value: "redpanda:33145"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /v1/status/ready
      port: 9644