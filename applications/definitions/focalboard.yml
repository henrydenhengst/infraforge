---
# =============================================================================
# DOKUWIKI - EENVOUDIGE WIKI ZONDER DATABASE
# =============================================================================
# Beschrijving: Eenvoudige wiki zonder database (flat-file)
# Website: https://www.dokuwiki.org
# =============================================================================

application:
  name: dokuwiki
  version: 2023-04-04
  description: "DokuWiki - Eenvoudige wiki zonder database"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: documentation-team
    contact: docs@company.local
    slack: "#docs"
    documentation: "https://www.dokuwiki.org/manual"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 0.5
      recommended_cpu_cores: 1
      recommended_ram_gb: 1
      
    storage:
      - name: data
        size_gb: 5
        performance: ssd
        backup_required: true
        mount_path: /data
      - name: pages
        size_gb: 5
        performance: ssd
        backup_required: true
        mount_path: /dokuwiki/data/pages
        
  network_requirements:
    vlans:
      - documentation
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "DokuWiki web interface"
    dns:
      - "dokuwiki.{{ domain }}"
      
  container:
    image: linuxserver/dokuwiki:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "0.5"
        memory: 512Mi
        
  environment_variables:
    - name: PUID
      value: "1000"
      secret: false
    - name: PGID
      value: "1000"
      secret: false
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80