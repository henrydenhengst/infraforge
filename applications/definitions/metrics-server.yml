---
# =============================================================================
# ADMINER - DATABASE MANAGEMENT
# =============================================================================
# Beschrijving: Lightweight database management tool
# Website: https://www.adminer.org
# =============================================================================

application:
  name: adminer
  version: 4.8.1
  description: "Adminer - Lightweight database management"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: dba-team
    contact: dba@company.local
    slack: "#database"
    documentation: "https://www.adminer.org/en"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 0.5
      recommended_cpu_cores: 1
      recommended_ram_gb: 1
      
    storage:
      - name: data
        size_gb: 1
        performance: ssd
        backup_required: true
        mount_path: /var/www/html
        
  network_requirements:
    vlans:
      - database
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "Adminer web UI"
    dns:
      - "adminer.{{ domain }}"
      - "db-admin.{{ domain }}"
      
  container:
    image: adminer:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "0.5"
        memory: 512Mi
        
  environment_variables:
    - name: ADMINER_DESIGN
      value: "nette"
      secret: false
    - name: ADMINER_DEFAULT_SERVER
      value: "mysql"
      secret: false
    - name: ADMINER_DEFAULT_USER
      value: "root"
      secret: false
    - name: ADMINER_DEFAULT_PASSWORD
      value: "{{ vault_mysql_root_password }}"
      secret: true
    - name: ADMINER_PLUGINS
      value: "tables-filter,edit-calendar"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80