---
# =============================================================================
# ROCKETCHAT - TEAM CHAT MET VIDEO
# =============================================================================
# Beschrijving: Team-chat platform met videogesprekken
# Website: https://rocket.chat
# =============================================================================

application:
  name: rocketchat
  version: 6.5.0
  description: "RocketChat - Team chat met video"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: communication-team
    contact: comms@company.local
    slack: "#comms"
    documentation: "https://docs.rocket.chat"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /app/data
      - name: uploads
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /app/uploads
        
  network_requirements:
    vlans:
      - communication
      - internal
    ports:
      - container: 3000
        host: 3000
        protocol: tcp
        public: true
        description: "RocketChat web interface"
    dns:
      - "rocketchat.{{ domain }}"
      - "chat.{{ domain }}"
      
  container:
    image: rocketchat/rocket.chat:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: MONGO_URL
      value: "mongodb://mongodb:27017/rocketchat"
      secret: false
    - name: MONGO_OPLOG_URL
      value: "mongodb://mongodb:27017/local"
      secret: false
    - name: ROOT_URL
      value: "https://chat.{{ domain }}"
      secret: false
    - name: ADMIN_USERNAME
      value: "admin"
      secret: false
    - name: ADMIN_PASS
      value: "{{ vault_rocketchat_admin_password }}"
      secret: true
    - name: ADMIN_EMAIL
      value: "admin@{{ domain }}"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 3000