---
# =============================================================================
# SALEOR - GRAPHQL E-COMMERCE PLATFORM
# =============================================================================
# Beschrijving: GraphQL-gebaseerd e-commerce platform
# Website: https://saleor.io
# =============================================================================

application:
  name: saleor
  version: 3.14.0
  description: "Saleor - GraphQL e-commerce platform"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: ecommerce-team
    contact: ecommerce@company.local
    slack: "#ecommerce"
    documentation: "https://docs.saleor.io"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /app/data
      - name: media
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /app/media
        
  network_requirements:
    vlans:
      - ecommerce
      - dmz
    ports:
      - container: 8000
        host: 8000
        protocol: tcp
        public: true
        description: "Saleor API"
      - container: 9000
        host: 9000
        protocol: tcp
        public: false
        description: "Saleor dashboard"
    dns:
      - "saleor.{{ domain }}"
      - "dashboard.{{ domain }}"
      
  container:
    image: saleor/saleor:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  sidecars:
    - name: dashboard
      image: saleor/saleor-dashboard:latest
      ports:
        - container: 80
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
    - name: worker
      image: saleor/saleor:latest
      command: celery -A saleor worker --app=saleor.celeryconf:app -l info
      
  environment_variables:
    - name: DATABASE_URL
      value: "postgresql://saleor:{{ vault_saleor_password }}@postgres:5432/saleor"
      secret: true
    - name: SECRET_KEY
      value: "{{ vault_saleor_secret }}"
      secret: true
    - name: REDIS_URL
      value: "redis://redis:6379"
      secret: false
    - name: DEFAULT_FROM_EMAIL
      value: "saleor@{{ domain }}"
      secret: false
    - name: EMAIL_URL
      value: "smtp://smtp.{{ domain }}:587/?tls=True&user=saleor@{{ domain }}&password={{ vault_smtp_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /health/
      port: 8000