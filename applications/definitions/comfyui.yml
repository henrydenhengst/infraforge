---
# =============================================================================
# LANGLOW - LOW-CODE AI PIPELINES
# =============================================================================
# Beschrijving: Low-code UI voor het ontwerpen van complexe AI-pipelines
# Website: https://langflow.org
# =============================================================================

application:
  name: langflow
  version: 1.0.0
  description: "Langflow - Low-code AI pipeline designer"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: ai-team
    contact: ai@company.local
    slack: "#ai"
    documentation: "https://docs.langflow.org"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /app/data
        
  network_requirements:
    vlans:
      - ai
      - internal
    ports:
      - container: 7860
        host: 7860
        protocol: tcp
        public: true
        description: "Langflow web UI"
    dns:
      - "langflow.{{ domain }}"
      - "langflow.ai.{{ domain }}"
      
  container:
    image: langflowai/langflow:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  environment_variables:
    - name: LANGFLOW_AUTO_LOGIN
      value: "false"
      secret: false
    - name: LANGFLOW_SUPERUSER
      value: admin
      secret: false
    - name: LANGFLOW_SUPERUSER_PASSWORD
      value: "{{ vault_langflow_password }}"
      secret: true
    - name: LANGFLOW_SECRET_KEY
      value: "{{ vault_langflow_secret }}"
      secret: true
    - name: LANGFLOW_DATABASE_URL
      value: "sqlite:////app/data/langflow.db"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 7860