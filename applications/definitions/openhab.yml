---
# =============================================================================
# DELUGE - TORRENT-CLIËNT MET PLUGINS
# =============================================================================
# Beschrijving: Torrent-cliënt met plugin ondersteuning
# Website: https://deluge-torrent.org
# =============================================================================

application:
  name: deluge
  version: 2.1.0
  description: "Deluge - Torrent-cliënt met plugins"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: media-team
    contact: media@company.local
    slack: "#media"
    documentation: "https://deluge.readthedocs.io"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: config
        size_gb: 1
        performance: ssd
        backup_required: true
        mount_path: /config
      - name: downloads
        size_gb: 500
        performance: hdd
        backup_required: false
        mount_path: /downloads
        
  network_requirements:
    vlans:
      - media
      - internal
    ports:
      - container: 8112
        host: 8112
        protocol: tcp
        public: false
        description: "Deluge web interface"
      - container: 58846
        host: 58846
        protocol: tcp
        public: false
        description: "Deluge daemon"
      - container: 58946
        host: 58946
        protocol: tcp
        public: true
        description: "Torrent peer port"
      - container: 58946
        host: 58946
        protocol: udp
        public: true
        description: "Torrent peer port (UDP)"
    dns:
      - "deluge.{{ domain }}"
      
  container:
    image: linuxserver/deluge:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: PUID
      value: "1000"
      secret: false
    - name: PGID
      value: "1000"
      secret: false
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
    - name: DELUGE_LOGLEVEL
      value: "info"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 8112