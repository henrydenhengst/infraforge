---
# =============================================================================
# MEDUSA - HEADLESS COMMERCE PLATFORM
# =============================================================================
# Beschrijving: Headless commerce platform (Shopify alternatief)
# Website: https://medusajs.com
# =============================================================================

application:
  name: medusa
  version: 1.20.0
  description: "Medusa - Headless commerce platform"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: ecommerce-team
    contact: ecommerce@company.local
    slack: "#ecommerce"
    documentation: "https://docs.medusajs.com"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /app/data
      - name: uploads
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /app/uploads
        
  network_requirements:
    vlans:
      - ecommerce
      - dmz
    ports:
      - container: 9000
        host: 9000
        protocol: tcp
        public: true
        description: "Medusa API"
      - container: 7000
        host: 7000
        protocol: tcp
        public: false
        description: "Medusa admin"
    dns:
      - "medusa.{{ domain }}"
      - "store.{{ domain }}"
      - "admin.{{ domain }}"
      
  container:
    image: medusajs/medusa:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: DATABASE_URL
      value: "postgresql://medusa:{{ vault_medusa_password }}@postgres:5432/medusa"
      secret: true
    - name: REDIS_URL
      value: "redis://redis:6379"
      secret: false
    - name: JWT_SECRET
      value: "{{ vault_medusa_jwt }}"
      secret: true
    - name: COOKIE_SECRET
      value: "{{ vault_medusa_cookie }}"
      secret: true
    - name: STORE_CORS
      value: "https://store.{{ domain }}"
      secret: false
    - name: ADMIN_CORS
      value: "https://admin.{{ domain }}"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 9000