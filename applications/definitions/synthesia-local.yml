---
# =============================================================================
# PINRY - INSPIRATIEBOARD VOOR DESIGNERS
# =============================================================================
# Beschrijving: Inspiratieboard (Pinterest-kloon) voor designers
# Website: https://getpinry.com
# =============================================================================

application:
  name: pinry
  version: 2.0.0
  description: "Pinry - Inspiratieboard voor designers"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: creative-team
    contact: creative@company.local
    slack: "#creative"
    documentation: "https://getpinry.com/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - creative
      - internal
    ports:
      - container: 8080
        host: 8080
        protocol: tcp
        public: false
        description: "Pinry web interface"
    dns:
      - "inspiration.{{ domain }}"
      - "pinry.{{ domain }}"
      
  container:
    image: getpinry/pinry:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: PINRY_SECRET_KEY
      value: "{{ vault_pinry_secret }}"
      secret: true
    - name: PINRY_ALLOW_REGISTRATION
      value: "false"
      secret: false
    - name: PINRY_DEFAULT_USERNAME
      value: "admin"
      secret: false
    - name: PINRY_DEFAULT_PASSWORD
      value: "{{ vault_pinry_password }}"
      secret: true
    - name: PINRY_DEFAULT_EMAIL
      value: "admin@{{ domain }}"
      secret: false
    - name: PINRY_SOCIAL_AUTH_GOOGLE_OAUTH2_KEY
      value: "{{ vault_google_client_id }}"
      secret: true
    - name: PINRY_SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET
      value: "{{ vault_google_client_secret }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 8080