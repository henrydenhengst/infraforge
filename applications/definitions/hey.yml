---
# =============================================================================
# OPENTELEMETRY COLLECTOR - TELEMETRY COLLECTION
# =============================================================================
# Beschrijving: Collecteert en exporteert telemetrie data (traces, metrics, logs)
# Website: https://opentelemetry.io
# =============================================================================

application:
  name: opentelemetry-collector
  version: 0.91.0
  description: "OpenTelemetry Collector - Telemetry collection"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: monitoring-team
    contact: monitoring@company.local
    slack: "#monitoring"
    documentation: "https://opentelemetry.io/docs/collector"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: false
        mount_path: /data
        
  network_requirements:
    vlans:
      - monitoring
      - internal
    ports:
      - container: 4317
        host: 4317
        protocol: tcp
        public: false
        description: "OTLP gRPC"
      - container: 4318
        host: 4318
        protocol: tcp
        public: false
        description: "OTLP HTTP"
      - container: 8888
        host: 8888
        protocol: tcp
        public: false
        description: "Prometheus metrics"
      - container: 13133
        host: 13133
        protocol: tcp
        public: false
        description: "Health check"
    dns:
      - "otel-collector.{{ domain }}"
      
  container:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: OTEL_COLLECTOR_CONFIG
      value: |
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
        processors:
          batch:
            timeout: 1s
            send_batch_size: 1024
          memory_limiter:
            check_interval: 1s
            limit_mib: 512
        exporters:
          prometheus:
            endpoint: 0.0.0.0:8888
          logging:
            loglevel: debug
          jaeger:
            endpoint: jaeger:14250
            tls:
              insecure: true
        service:
          pipelines:
            traces:
              receivers: [otlp]
              processors: [memory_limiter, batch]
              exporters: [jaeger, logging]
            metrics:
              receivers: [otlp]
              processors: [memory_limiter, batch]
              exporters: [prometheus, logging]
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 13133