---
# =============================================================================
# ALPINE - LICHTGEWICHT CONTAINER OS
# =============================================================================
# Beschrijving: Lichtgewicht, beveiligde Linux distributie voor containers
# Website: https://alpinelinux.org
# =============================================================================

application:
  name: alpine
  version: 3.19
  description: "Alpine - Lichtgewicht container OS"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: platform-team
    contact: platform@company.local
    slack: "#platform"
    documentation: "https://wiki.alpinelinux.org"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 0.5
      min_ram_gb: 0.5
      recommended_cpu_cores: 1
      recommended_ram_gb: 1
      
    storage:
      - name: data
        size_gb: 5
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - os
      - internal
    ports: []
    dns: []
    
  container:
    image: alpine:3.19
    restart: unless-stopped
    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "0.5"
        memory: 512Mi
        
  command: ["tail", "-f", "/dev/null"]
  
  environment_variables:
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
      
  health_checks:
    liveness:
      type: exec
      command: ["cat", "/etc/os-release"]