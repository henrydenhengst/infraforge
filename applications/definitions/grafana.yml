---
# =============================================================================
# NEXTCLOUD - BESTANDSHUB EN SAMENWERKING
# =============================================================================
# Beschrijving: Open-source platform voor bestandsopslag, delen en samenwerking
# Website: https://nextcloud.com
# =============================================================================

application:
  name: nextcloud
  version: 28.0.2
  description: "Nextcloud - Bestandshub en office suite voor teams"
  environment: "{{ environment | default('production') }}"
  
  # ===========================================================================
  # EIGENAAR & CONTACT
  # ===========================================================================
  owner:
    team: platform-team
    contact: platform@company.local
    slack: "#platform"
    documentation: "https://docs.nextcloud.com/"
    
  # ===========================================================================
  # HARDWARE VEREISTEN
  # ===========================================================================
  hardware_requirements:
    compute:
      min_cpu_cores: 4
      min_ram_gb: 8
      recommended_cpu_cores: 8
      recommended_ram_gb: 16
      cpu_architecture: x86_64
      gpu_required: false
      
    storage:
      - name: data
        size_gb: 500
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/data
        description: "Gebruikersdata, bestanden, uploads"
        
      - name: config
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/config
        description: "Configuratiebestanden"
        
      - name: apps
        size_gb: 20
        performance: ssd
        backup_required: false
        mount_path: /var/www/html/custom_apps
        description: "Geïnstalleerde apps en extensies"
        
      - name: db
        size_gb: 100
        performance: ssd
        backup_required: true
        mount_path: /var/lib/postgresql/data
        description: "Database data (extern)"
        
  # ===========================================================================
  # NETWERK VEREISTEN
  # ===========================================================================
  network_requirements:
    vlans:
      - dmz
      - app
      - db
      
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: true
        ingress: true
        description: "HTTP (wordt omgeleid naar HTTPS)"
        
      - container: 443
        host: 8443
        protocol: tcp
        public: true
        ingress: true
        description: "HTTPS web interface"
        
    dns:
      - "nextcloud.{{ domain }}"
      - "cloud.{{ domain }}"
      - "files.{{ domain }}"
      
    load_balancer:
      enabled: true
      method: round_robin
      ssl_termination: true
      
  # ===========================================================================
  # CONTAINER CONFIGURATIE
  # ===========================================================================
  container:
    image: nextcloud:28-fpm-alpine
    replicas: 2
    restart: unless-stopped
    
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
    security_context:
      run_as_user: 33
      run_as_group: 33
      fs_group: 33
      
  # ===========================================================================
  # SIDECARS (EXTRA CONTAINERS)
  # ===========================================================================
  sidecars:
    - name: nginx
      image: nginx:alpine
      ports:
        - container: 80
        - container: 443
      volumes:
        - ./nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
        - data:/var/www/html:ro
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
          
    - name: redis
      image: redis:alpine
      command: redis-server --appendonly yes --requirepass {{ vault_redis_password }}
      volumes:
        - redis_data:/data
      resources:
        limits:
          cpu: "1"
          memory: 1Gi
          
    - name: cron
      image: nextcloud:28-fpm-alpine
      entrypoint: /cron.sh
      volumes:
        - data:/var/www/html
        - config:/var/www/html/config
        - apps:/var/www/html/custom_apps
      resources:
        limits:
          cpu: "0.5"
          memory: 512Mi
          
    - name: collabora
      image: collabora/code:latest
      ports:
        - container: 9980
      environment:
        - domain: "{{ domain }}"
        - username: admin
        - password: "{{ vault_collabora_password }}"
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
          
    - name: postgres
      image: postgres:15-alpine
      environment:
        POSTGRES_DB: nextcloud
        POSTGRES_USER: nextcloud
        POSTGRES_PASSWORD: "{{ vault_nextcloud_db_password }}"
      volumes:
        - db:/var/lib/postgresql/data
      resources:
        limits:
          cpu: "2"
          memory: 4Gi
          
  # ===========================================================================
  # OMGEVINGSVARIABELEN
  # ===========================================================================
  environment_variables:
    - name: NEXTCLOUD_ADMIN_USER
      value: admin
      secret: false
      description: "Admin gebruikersnaam"
      
    - name: NEXTCLOUD_ADMIN_PASSWORD
      value: "{{ vault_nextcloud_admin_password }}"
      secret: true
      description: "Admin wachtwoord"
      
    - name: POSTGRES_DB
      value: nextcloud
      secret: false
      
    - name: POSTGRES_USER
      value: nextcloud
      secret: false
      
    - name: POSTGRES_PASSWORD
      value: "{{ vault_nextcloud_db_password }}"
      secret: true
      
    - name: POSTGRES_HOST
      value: postgres
      secret: false
      
    - name: REDIS_HOST
      value: redis
      secret: false
      
    - name: REDIS_PORT
      value: "6379"
      secret: false
      
    - name: REDIS_HOST_PASSWORD
      value: "{{ vault_redis_password }}"
      secret: true
      
    - name: NEXTCLOUD_TRUSTED_DOMAINS
      value: "nextcloud.{{ domain }} cloud.{{ domain }} files.{{ domain }}"
      secret: false
      
    - name: NEXTCLOUD_DATA_DIR
      value: /var/www/html/data
      secret: false
      
    - name: PHP_MEMORY_LIMIT
      value: 512M
      secret: false
      
    - name: PHP_UPLOAD_LIMIT
      value: 10G
      secret: false
      
    - name: PHP_MAX_FILE_UPLOADS
      value: "20"
      secret: false
      
    - name: SMTP_HOST
      value: smtp.{{ domain }}
      secret: false
      
    - name: SMTP_PORT
      value: "587"
      secret: false
      
    - name: SMTP_USERNAME
      value: nextcloud@{{ domain }}
      secret: false
      
    - name: SMTP_PASSWORD
      value: "{{ vault_smtp_password }}"
      secret: true
      
    - name: SMTP_SECURE
      value: tls
      secret: false
      
    - name: MAIL_FROM_ADDRESS
      value: nextcloud
      secret: false
      
    - name: MAIL_DOMAIN
      value: "{{ domain }}"
      secret: false
      
  # ===========================================================================
  # CONFIGURATIEBESTANDEN
  # ===========================================================================
  config_files:
    - path: /var/www/html/config/autoconfig.php
      template: nextcloud/autoconfig.php.j2
      mode: "0644"
      owner: "www-data:www-data"
      
    - path: /var/www/html/config/config.php
      template: nextcloud/config.php.j2
      mode: "0644"
      owner: "www-data:www-data"
      
  # ===========================================================================
  # HEALTH CHECKS
  # ===========================================================================
  health_checks:
    liveness:
      type: http
      path: /status.php
      port: 9000
      initial_delay: 60
      period: 30
      timeout: 10
      retries: 3
      
    readiness:
      type: http
      path: /status.php
      port: 9000
      initial_delay: 10
      period: 15
      timeout: 5
      retries: 5
      
    startup:
      type: http
      path: /status.php
      port: 9000
      initial_delay: 0
      period: 5
      failure_threshold: 30
      
  # ===========================================================================
  # MONITORING
  # ===========================================================================
  monitoring:
    metrics:
      enabled: true
      exporter: nextcloud-exporter
      port: 9205
      path: /metrics
      scrape_interval: 30s
      
    logs:
      enabled: true
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
      locations:
        - /var/www/html/data/nextcloud.log
        
    alerts:
      - name: nextcloud_down
        condition: up{app="nextcloud"} == 0
        duration: 2m
        severity: critical
        action: pagerduty
        description: "Nextcloud is niet bereikbaar"
        
      - name: storage_low
        condition: nextcloud_storage_usage > 85%
        duration: 1h
        severity: warning
        action: slack
        description: "Opslagruimte wordt bijna vol"
        
      - name: high_load
        condition: nextcloud_system_load > 5
        duration: 5m
        severity: warning
        action: email
        description: "Hoge systeembelasting"
        
      - name: failed_logins
        condition: nextcloud_failed_logins > 10
        duration: 5m
        severity: warning
        action: slack
        description: "Meerdere mislukte inlogpogingen"
        
  # ===========================================================================
  # BACKUP
  # ===========================================================================
  backup:
    enabled: true
    schedule: "0 1 * * *"
    retention_days: 30
    volumes:
      - data
      - config
      - apps
      - db
    databases:
      - type: postgres
        name: nextcloud
        host: postgres
        username: nextcloud
        password: "{{ vault_nextcloud_db_password }}"
    pre_backup:
      - command: "sudo -u www-data php occ maintenance:mode --on"
        when: backup_type == "full"
    post_backup:
      - command: "sudo -u www-data php occ maintenance:mode --off"
        when: backup_type == "full"
        
  # ===========================================================================
  # APPS (NEXTCLOUD APPS)
  # ===========================================================================
  apps:
    - name: calendar
      enabled: true
      version: latest
    - name: contacts
      enabled: true
      version: latest
    - name: mail
      enabled: true
      version: latest
    - name: talk
      enabled: true
      version: latest
      config:
        turn_server: turn.{{ domain }}
        turn_secret: "{{ vault_turn_secret }}"
        stun_server: stun.{{ domain }}
    - name: deck
      enabled: true
      version: latest
    - name: notes
      enabled: true
      version: latest
    - name: tasks
      enabled: true
      version: latest
    - name: collectives
      enabled: true
      version: latest
    - name: groupfolders
      enabled: true
      version: latest
    - name: onlyoffice
      enabled: true
      version: latest
      config:
        document_server_url: "https://onlyoffice.{{ domain }}"
        document_server_secret: "{{ vault_onlyoffice_secret }}"
    - name: recognize
      enabled: true
      version: latest
      config:
        ai_model: "llama3"
        ai_api_url: "http://ollama:11434"