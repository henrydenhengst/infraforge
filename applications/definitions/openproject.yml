---
# =============================================================================
# PLANE - MODERNE SOFTWARE PLANNING TOOL
# =============================================================================
# Beschrijving: Moderne software planning tool (Linear alternatief)
# Website: https://plane.so
# =============================================================================

application:
  name: plane
  version: 0.17.0
  description: "Plane - Moderne software planning tool"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: project-team
    contact: pm@company.local
    slack: "#project"
    documentation: "https://docs.plane.so"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - project
      - internal
    ports:
      - container: 80
        host: 8083
        protocol: tcp
        public: false
        description: "Plane web interface"
    dns:
      - "plane.{{ domain }}"
      - "linear.{{ domain }}"
      
  container:
    image: makeplane/plane:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: DATABASE_URL
      value: "postgresql://plane:{{ vault_plane_password }}@postgres:5432/plane"
      secret: true
    - name: SECRET_KEY
      value: "{{ vault_plane_secret }}"
      secret: true
    - name: NEXT_PUBLIC_API_BASE_URL
      value: "https://plane.{{ domain }}/api"
      secret: false
    - name: NEXT_PUBLIC_ADMIN_EMAIL
      value: "admin@{{ domain }}"
      secret: false
    - name: NEXT_PUBLIC_ADMIN_PASSWORD
      value: "{{ vault_plane_admin_password }}"
      secret: true
    - name: REDIS_URL
      value: "redis://redis:6379"
      secret: false
    - name: MINIO_ENDPOINT
      value: "minio:9000"
      secret: false
    - name: MINIO_ACCESS_KEY
      value: "minioadmin"
      secret: false
    - name: MINIO_SECRET_KEY
      value: "{{ vault_minio_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 80