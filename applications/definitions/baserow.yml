---
# =============================================================================
# ORANGEHRM - HR MANAGEMENT
# =============================================================================
# Beschrijving: Gespecialiseerde suite voor werving en personeelsbeheer
# Website: https://www.orangehrm.com
# =============================================================================

application:
  name: orangehrm
  version: 5.5.0
  description: "OrangeHRM - HR Management"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: hr-team
    contact: hr@company.local
    slack: "#hr"
    documentation: "https://www.orangehrm.com/documentation"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/www/html
      - name: logs
        size_gb: 5
        performance: ssd
        backup_required: false
        mount_path: /var/www/html/src/logs
        
  network_requirements:
    vlans:
      - hr
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "OrangeHRM web interface"
    dns:
      - "hr.{{ domain }}"
      - "orangehrm.{{ domain }}"
      
  container:
    image: orangehrm/orangehrm:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: ORANGEHRM_DB_HOST
      value: "mysql"
      secret: false
    - name: ORANGEHRM_DB_PORT
      value: "3306"
      secret: false
    - name: ORANGEHRM_DB_NAME
      value: "orangehrm"
      secret: false
    - name: ORANGEHRM_DB_USER
      value: "orangehrm"
      secret: false
    - name: ORANGEHRM_DB_PASSWORD
      value: "{{ vault_orangehrm_password }}"
      secret: true
    - name: ORANGEHRM_ADMIN_USER
      value: "admin"
      secret: false
    - name: ORANGEHRM_ADMIN_PASSWORD
      value: "{{ vault_orangehrm_admin_password }}"
      secret: true
    - name: ORANGEHRM_ADMIN_EMAIL
      value: "admin@{{ domain }}"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80