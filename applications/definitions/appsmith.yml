---
# =============================================================================
# APPSMITH - LOW-CODE INTERNE TOOLS
# =============================================================================
# Beschrijving: Low-code platform voor interne tools en applicaties
# Website: https://www.appsmith.com
# =============================================================================

application:
  name: appsmith
  version: 1.9.46
  description: "Appsmith - Low-code interne tools"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: development-team
    contact: dev@company.local
    slack: "#development"
    documentation: "https://docs.appsmith.com"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /appsmith-stacks
        
  network_requirements:
    vlans:
      - development
      - internal
    ports:
      - container: 80
        host: 8081
        protocol: tcp
        public: true
        description: "Appsmith HTTP"
      - container: 443
        host: 8443
        protocol: tcp
        public: true
        description: "Appsmith HTTPS"
    dns:
      - "appsmith.{{ domain }}"
      - "apps.{{ domain }}"
      
  container:
    image: appsmith/appsmith-ce:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  environment_variables:
    - name: APPSMITH_ENCRYPTION_PASSWORD
      value: "{{ vault_appsmith_password }}"
      secret: true
    - name: APPSMITH_ENCRYPTION_SALT
      value: "{{ vault_appsmith_salt }}"
      secret: true
    - name: APPSMITH_GOOGLE_CLIENT_ID
      value: "{{ vault_google_client_id }}"
      secret: false
    - name: APPSMITH_GOOGLE_CLIENT_SECRET
      value: "{{ vault_google_client_secret }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /api/v1/health
      port: 80