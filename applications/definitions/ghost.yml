---
# =============================================================================
# GHOST - PLATFORM VOOR BETAALDE NIEUWSBRIEVEN
# =============================================================================
# Beschrijving: Platform voor betaalde nieuwsbrieven en abonnementen
# Website: https://ghost.org
# =============================================================================

application:
  name: ghost
  version: 5.80.0
  description: "Ghost - Platform voor nieuwsbrieven"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: marketing-team
    contact: marketing@company.local
    slack: "#marketing"
    documentation: "https://ghost.org/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/lib/ghost/content
        description: "Ghost content (posts, images, themes)"
        
  network_requirements:
    vlans:
      - marketing
      - dmz
    ports:
      - container: 2368
        host: 2368
        protocol: tcp
        public: true
        description: "Ghost web interface"
    dns:
      - "ghost.{{ domain }}"
      - "news.{{ domain }}"
      - "blog.{{ domain }}"
      
  container:
    image: ghost:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: url
      value: "https://ghost.{{ domain }}"
      secret: false
    - name: database__client
      value: "mysql"
      secret: false
    - name: database__connection__host
      value: "mysql"
      secret: false
    - name: database__connection__user
      value: "ghost"
      secret: false
    - name: database__connection__password
      value: "{{ vault_ghost_password }}"
      secret: true
    - name: database__connection__database
      value: "ghost"
      secret: false
    - name: mail__transport
      value: "SMTP"
      secret: false
    - name: mail__options__host
      value: "smtp.{{ domain }}"
      secret: false
    - name: mail__options__port
      value: "587"
      secret: false
    - name: mail__options__auth__user
      value: "ghost@{{ domain }}"
      secret: false
    - name: mail__options__auth__pass
      value: "{{ vault_smtp_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /ghost/api/admin/site/
      port: 2368