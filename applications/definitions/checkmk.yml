---
# =============================================================================
# APPSMITH-AI - ADMIN-PANELS MET AI
# =============================================================================
# Beschrijving: Admin-panels bouwen met geïntegreerde AI
# Website: https://www.appsmith.com/ai
# =============================================================================

application:
  name: appsmith-ai
  version: 1.9.46
  description: "Appsmith-AI - Admin-panels met AI"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: development-team
    contact: dev@company.local
    slack: "#development"
    documentation: "https://docs.appsmith.com/ai"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /appsmith-stacks
        
  network_requirements:
    vlans:
      - development
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "Appsmith-AI web interface"
    dns:
      - "appsmith-ai.{{ domain }}"
      
  container:
    image: appsmith/appsmith-ee:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  environment_variables:
    - name: APPSMITH_AI_ENABLED
      value: "true"
      secret: false
    - name: OPENAI_API_KEY
      value: "{{ vault_openai_key }}"
      secret: true
    - name: APPSMITH_ENCRYPTION_PASSWORD
      value: "{{ vault_appsmith_ai_password }}"
      secret: true
    - name: APPSMITH_ENCRYPTION_SALT
      value: "{{ vault_appsmith_ai_salt }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /api/v1/health
      port: 80