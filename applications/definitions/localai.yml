---
# =============================================================================
# PORTAINER - DOCKER MANAGEMENT UI
# =============================================================================
# Beschrijving: Web-based management interface voor Docker
# Website: https://www.portainer.io
# =============================================================================

application:
  name: portainer
  version: 2.19.1
  description: "Portainer - Docker management UI"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: platform-team
    contact: platform@company.local
    slack: "#platform"
    documentation: "https://docs.portainer.io"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - management
      - internal
    ports:
      - container: 9000
        host: 9000
        protocol: tcp
        public: false
        description: "Portainer (HTTP)"
      - container: 9443
        host: 9443
        protocol: tcp
        public: true
        description: "Portainer (HTTPS)"
    dns:
      - "portainer.{{ domain }}"
      - "docker.{{ domain }}"
      
  container:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: TZ
      value: "Europe/Amsterdam"
      secret: false
      
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - data:/data
    
  health_checks:
    liveness:
      type: http
      path: /
      port: 9000
      initial_delay: 30