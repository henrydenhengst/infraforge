---
# =============================================================================
# LEANTICE - JURIDISCH DOSSIERBEHEER
# =============================================================================
# Beschrijving: Beheersysteem voor juridische dossiers en termijnen
# Website: https://leantime.io
# =============================================================================

application:
  name: leantice
  version: 2.4.0
  description: "Leantice - Juridisch dossierbeheer"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: legal-team
    contact: legal@company.local
    slack: "#legal"
    documentation: "https://docs.leantime.io"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/www/html
        
  network_requirements:
    vlans:
      - legal
      - internal
    ports:
      - container: 80
        host: 8081
        protocol: tcp
        public: false
        description: "Leantice web interface"
    dns:
      - "legal.{{ domain }}"
      - "leantice.{{ domain }}"
      
  container:
    image: leantime/leantime:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: LEANTIME_DB_HOST
      value: "mysql"
      secret: false
    - name: LEANTIME_DB_DATABASE
      value: "leantice"
      secret: false
    - name: LEANTIME_DB_USER
      value: "leantice"
      secret: false
    - name: LEANTIME_DB_PASSWORD
      value: "{{ vault_leantice_password }}"
      secret: true
    - name: LEANTIME_SESSION_PASSWORD
      value: "{{ vault_leantice_session }}"
      secret: true
    - name: LEANTIME_EMAIL
      value: "legal@{{ domain }}"
      secret: false
    - name: LEANTIME_PASSWORD
      value: "{{ vault_leantice_admin_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80