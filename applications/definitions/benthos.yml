---
# =============================================================================
# HELPY - KLANTENSERVICE PLATFORM
# =============================================================================
# Beschrijving: Klantenservice platform met focus op privacy
# Website: https://helpy.io
# =============================================================================

application:
  name: helpy
  version: 3.0.0
  description: "Helpy - Klantenservice platform"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: support-team
    contact: support@company.local
    slack: "#support"
    documentation: "https://helpy.io/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /helpy/public
      - name: db
        size_gb: 5
        performance: ssd
        backup_required: true
        mount_path: /helpy/db
        
  network_requirements:
    vlans:
      - support
      - internal
    ports:
      - container: 3000
        host: 3000
        protocol: tcp
        public: false
        description: "Helpy web interface"
    dns:
      - "helpy.{{ domain }}"
      - "support.{{ domain }}"
      
  container:
    image: helpy/helpy:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: RAILS_ENV
      value: "production"
      secret: false
    - name: SECRET_KEY_BASE
      value: "{{ vault_helpy_secret }}"
      secret: true
    - name: DEVISE_SECRET_KEY
      value: "{{ vault_helpy_devise_secret }}"
      secret: true
    - name: DOMAIN
      value: "helpy.{{ domain }}"
      secret: false
    - name: PROTOCOL
      value: "https"
      secret: false
    - name: SMTP_ADDRESS
      value: "smtp.{{ domain }}"
      secret: false
    - name: SMTP_PORT
      value: "587"
      secret: false
    - name: SMTP_USERNAME
      value: "helpy@{{ domain }}"
      secret: false
    - name: SMTP_PASSWORD
      value: "{{ vault_smtp_password }}"
      secret: true
    - name: SMTP_DOMAIN
      value: "{{ domain }}"
      secret: false
    - name: SMTP_AUTHENTICATION
      value: "login"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /health_check
      port: 3000