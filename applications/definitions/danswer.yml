---
# =============================================================================
# LIBRESIGN - DIGITALE HANDTEKENINGEN VOOR NEXTCLOUD
# =============================================================================
# Beschrijving: Digitale handtekeningen geïntegreerd in Nextcloud
# Website: https://libresign.github.io
# =============================================================================

application:
  name: libresign
  version: 1.0.0
  description: "LibreSign - Digitale handtekeningen voor Nextcloud"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: legal-team
    contact: legal@company.local
    slack: "#legal"
    documentation: "https://libresign.github.io/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/www/html
      - name: config
        size_gb: 1
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/config
        
  network_requirements:
    vlans:
      - legal
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "LibreSign web interface"
    dns:
      - "sign.{{ domain }}"
      - "libresign.{{ domain }}"
      
  container:
    image: libresign/libresign:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: POSTGRES_HOST
      value: "postgres"
      secret: false
    - name: POSTGRES_PORT
      value: "5432"
      secret: false
    - name: POSTGRES_DB
      value: "libresign"
      secret: false
    - name: POSTGRES_USER
      value: "libresign"
      secret: false
    - name: POSTGRES_PASSWORD
      value: "{{ vault_libresign_password }}"
      secret: true
    - name: NEXTCLOUD_URL
      value: "https://nextcloud.{{ domain }}"
      secret: false
    - name: NEXTCLOUD_ADMIN_USER
      value: "admin"
      secret: false
    - name: NEXTCLOUD_ADMIN_PASSWORD
      value: "{{ vault_nextcloud_admin_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80