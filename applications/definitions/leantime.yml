---
# =============================================================================
# FOCALBOARD - OPEN-SOURCE TRELLO ALTERNATIEF
# =============================================================================
# Beschrijving: Open-source alternatief voor Trello
# Website: https://www.focalboard.com
# =============================================================================

application:
  name: focalboard
  version: 7.10.0
  description: "Focalboard - Open-source Trello alternatief"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: project-team
    contact: pm@company.local
    slack: "#project"
    documentation: "https://www.focalboard.com/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 5
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - project
      - internal
    ports:
      - container: 8000
        host: 8000
        protocol: tcp
        public: false
        description: "Focalboard web interface"
    dns:
      - "boards.{{ domain }}"
      - "focalboard.{{ domain }}"
      
  container:
    image: mattermost/focalboard:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: FOCALBOARD_PORT
      value: "8000"
      secret: false
    - name: FOCALBOARD_SERVER_ROOT
      value: "https://focalboard.{{ domain }}"
      secret: false
    - name: FOCALBOARD_DB_TYPE
      value: "postgres"
      secret: false
    - name: FOCALBOARD_DB_CONFIG
      value: "postgresql://focalboard:{{ vault_focalboard_password }}@postgres:5432/focalboard?sslmode=disable"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /api/v1/health
      port: 8000