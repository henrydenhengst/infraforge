---
# =============================================================================
# BUDIBASE - LOW-CODE APP BUILDER
# =============================================================================
# Beschrijving: Low-code platform voor interne applicaties
# Website: https://budibase.com
# =============================================================================

application:
  name: budibase
  version: 2.12.0
  description: "Budibase - Low-code app builder"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: development-team
    contact: dev@company.local
    slack: "#development"
    documentation: "https://docs.budibase.com"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - development
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "Budibase web interface"
    dns:
      - "budibase.{{ domain }}"
      
  container:
    image: budibase/budibase:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: BUDIBASE_COUCHDB_USER
      value: "admin"
      secret: false
    - name: BUDIBASE_COUCHDB_PASSWORD
      value: "{{ vault_budibase_couch_password }}"
      secret: true
    - name: BUDIBASE_MINIO_ACCESS_KEY
      value: "minioadmin"
      secret: false
    - name: BUDIBASE_MINIO_SECRET_KEY
      value: "{{ vault_minio_password }}"
      secret: true
    - name: BUDIBASE_REDIS_PASSWORD
      value: "{{ vault_redis_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 80