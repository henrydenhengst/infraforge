---
# =============================================================================
# HOPPER - ZELFGEHOSTE BLADWIJZER-APP MET AI-TAGGING
# =============================================================================
# Beschrijving: Zelfgehoste bladwijzer-app met AI-tagging
# Website: https://hopper.app
# =============================================================================

application:
  name: hoarder
  version: 1.0.0
  description: "Hoarder - Zelfgehoste bladwijzer-app met AI-tagging"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: tools-team
    contact: tools@company.local
    slack: "#tools"
    documentation: "https://hoarder.app/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /app/data
      - name: uploads
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /app/uploads
        
  network_requirements:
    vlans:
      - tools
      - internal
    ports:
      - container: 3000
        host: 3000
        protocol: tcp
        public: false
        description: "Hoarder web interface"
    dns:
      - "bookmarks.{{ domain }}"
      - "hoarder.{{ domain }}"
      
  container:
    image: hoarder/hoarder:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: DATABASE_URL
      value: "postgresql://hoarder:{{ vault_hoarder_password }}@postgres:5432/hoarder"
      secret: true
    - name: REDIS_URL
      value: "redis://redis:6379"
      secret: false
    - name: NEXTAUTH_SECRET
      value: "{{ vault_hoarder_nextauth_secret }}"
      secret: true
    - name: NEXTAUTH_URL
      value: "https://hoarder.{{ domain }}"
      secret: false
    - name: OPENAI_API_KEY
      value: "{{ vault_openai_key }}"
      secret: true
    - name: OPENAI_MODEL
      value: "gpt-3.5-turbo"
      secret: false
    - name: AI_TAGGING_ENABLED
      value: "true"
      secret: false
    - name: AI_SUMMARY_ENABLED
      value: "true"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 3000