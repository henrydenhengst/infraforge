---
# =============================================================================
# WOOCOMMERCE - E-COMMERCE PLATFORM
# =============================================================================
# Beschrijving: E-commerce via WordPress container
# Website: https://woocommerce.com
# =============================================================================

application:
  name: woocommerce
  version: 8.6.0
  description: "WooCommerce - E-commerce platform"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: ecommerce-team
    contact: ecommerce@company.local
    slack: "#ecommerce"
    documentation: "https://woocommerce.com/documentation"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /var/www/html
      - name: plugins
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/wp-content/plugins
      - name: uploads
        size_gb: 100
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/wp-content/uploads
        
  network_requirements:
    vlans:
      - ecommerce
      - dmz
    ports:
      - container: 80
        host: 8081
        protocol: tcp
        public: true
        description: "WooCommerce HTTP"
      - container: 443
        host: 8443
        protocol: tcp
        public: true
        description: "WooCommerce HTTPS"
    dns:
      - "shop.{{ domain }}"
      - "store.{{ domain }}"
      - "woocommerce.{{ domain }}"
      
  container:
    image: wordpress:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: WORDPRESS_DB_HOST
      value: "mysql:3306"
      secret: false
    - name: WORDPRESS_DB_USER
      value: "woocommerce"
      secret: false
    - name: WORDPRESS_DB_PASSWORD
      value: "{{ vault_woocommerce_password }}"
      secret: true
    - name: WORDPRESS_DB_NAME
      value: "woocommerce"
      secret: false
    - name: WORDPRESS_TABLE_PREFIX
      value: "wp_"
      secret: false
      
  plugins:
    - woocommerce
    - woocommerce-gateway-stripe
    - woocommerce-shipping
    - yoast-seo
    - wordfence
    
  health_checks:
    liveness:
      type: http
      path: /wp-admin/admin-ajax.php?action=woocommerce_health_check
      port: 80