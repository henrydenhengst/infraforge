---
# =============================================================================
# N8N - WORKFLOW AUTOMATION
# =============================================================================
# Beschrijving: Workflow automation met visuele editor (fair-code)
# Website: https://n8n.io
# =============================================================================

application:
  name: n8n
  version: 1.30.0
  description: "n8n - Workflow automation"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: automation-team
    contact: automation@company.local
    slack: "#automation"
    documentation: "https://docs.n8n.io"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /home/node/.n8n
        
  network_requirements:
    vlans:
      - automation
      - internal
    ports:
      - container: 5678
        host: 5678
        protocol: tcp
        public: false
        description: "n8n web interface"
    dns:
      - "n8n.{{ domain }}"
      - "workflows.{{ domain }}"
      
  container:
    image: n8nio/n8n:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: N8N_BASIC_AUTH_ACTIVE
      value: "true"
      secret: false
    - name: N8N_BASIC_AUTH_USER
      value: "admin"
      secret: false
    - name: N8N_BASIC_AUTH_PASSWORD
      value: "{{ vault_n8n_password }}"
      secret: true
    - name: N8N_HOST
      value: "n8n.{{ domain }}"
      secret: false
    - name: N8N_PROTOCOL
      value: "https"
      secret: false
    - name: WEBHOOK_URL
      value: "https://n8n.{{ domain }}/"
      secret: false
    - name: DB_TYPE
      value: "postgresdb"
      secret: false
    - name: DB_POSTGRESDB_HOST
      value: "postgres"
      secret: false
    - name: DB_POSTGRESDB_PORT
      value: "5432"
      secret: false
    - name: DB_POSTGRESDB_DATABASE
      value: "n8n"
      secret: false
    - name: DB_POSTGRESDB_USER
      value: "n8n"
      secret: false
    - name: DB_POSTGRESDB_PASSWORD
      value: "{{ vault_n8n_db_password }}"
      secret: true
      
  health_checks:
    liveness:
      type: http
      path: /healthz
      port: 5678