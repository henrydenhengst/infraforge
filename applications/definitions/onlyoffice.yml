---
# =============================================================================
# PRESTASHOP - E-COMMERCE PAKKET
# =============================================================================
# Beschrijving: Volledig zelfgehost e-commerce pakket
# Website: https://www.prestashop.com
# =============================================================================

application:
  name: prestashop
  version: 8.1.0
  description: "PrestaShop - Volledig e-commerce pakket"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: ecommerce-team
    contact: ecommerce@company.local
    slack: "#ecommerce"
    documentation: "https://docs.prestashop.com"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 2
      recommended_cpu_cores: 4
      recommended_ram_gb: 4
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /var/www/html
      - name: modules
        size_gb: 5
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/modules
      - name: themes
        size_gb: 5
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/themes
      - name: uploads
        size_gb: 50
        performance: ssd
        backup_required: true
        mount_path: /var/www/html/img
        
  network_requirements:
    vlans:
      - ecommerce
      - dmz
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: true
        description: "PrestaShop HTTP"
      - container: 443
        host: 8443
        protocol: tcp
        public: true
        description: "PrestaShop HTTPS"
    dns:
      - "shop.{{ domain }}"
      - "prestashop.{{ domain }}"
      
  container:
    image: prestashop/prestashop:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: "2"
        memory: 2Gi
        
  environment_variables:
    - name: PS_DOMAIN
      value: "prestashop.{{ domain }}"
      secret: false
    - name: PS_FOLDER_ADMIN
      value: "admin123"
      secret: false
    - name: PS_LANGUAGE
      value: "nl"
      secret: false
    - name: PS_COUNTRY
      value: "NL"
      secret: false
    - name: PS_INSTALL_AUTO
      value: "1"
      secret: false
    - name: DB_SERVER
      value: "mysql"
      secret: false
    - name: DB_USER
      value: "prestashop"
      secret: false
    - name: DB_PASSWD
      value: "{{ vault_prestashop_password }}"
      secret: true
    - name: DB_NAME
      value: "prestashop"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /
      port: 80