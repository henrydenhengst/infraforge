---
# =============================================================================
# HARBOR - CONTAINER IMAGE REGISTRY
# =============================================================================
# Beschrijving: Enterprise container image registry met security scanning
# Website: https://goharbor.io
# =============================================================================

application:
  name: harbor
  version: 2.10.0
  description: "Harbor - Container image registry"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: platform-team
    contact: platform@company.local
    slack: "#platform"
    documentation: "https://goharbor.io/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 2
      min_ram_gb: 4
      recommended_cpu_cores: 4
      recommended_ram_gb: 8
      
    storage:
      - name: data
        size_gb: 100
        performance: ssd
        backup_required: true
        mount_path: /data
      - name: database
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /database
      - name: storage
        size_gb: 500
        performance: hdd
        backup_required: true
        mount_path: /storage
        
  network_requirements:
    vlans:
      - platform
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "Harbor HTTP"
      - container: 443
        host: 8443
        protocol: tcp
        public: false
        description: "Harbor HTTPS"
      - container: 4443
        host: 4443
        protocol: tcp
        public: false
        description: "Harbor notary"
    dns:
      - "registry.{{ domain }}"
      - "harbor.{{ domain }}"
      
  container:
    image: goharbor/harbor:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
        
  environment_variables:
    - name: HARBOR_ADMIN_PASSWORD
      value: "{{ vault_harbor_admin_password }}"
      secret: true
    - name: HARBOR_DB_PASSWORD
      value: "{{ vault_harbor_db_password }}"
      secret: true
    - name: HARBOR_HOSTNAME
      value: "registry.{{ domain }}"
      secret: false
    - name: HARBOR_PROTOCOLS
      value: "https"
      secret: false
    - name: HARBOR_SECRET_KEY
      value: "{{ vault_harbor_secret_key }}"
      secret: true
    - name: HARBOR_CLAIR_ENABLED
      value: "true"
      secret: false
    - name: HARBOR_TRIVY_ENABLED
      value: "true"
      secret: false
    - name: HARBOR_NOTARY_ENABLED
      value: "true"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /api/v2.0/systeminfo
      port: 80