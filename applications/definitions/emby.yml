---
# =============================================================================
# HOMEBOX - INVENTARIS-TOOL
# =============================================================================
# Beschrijving: Snelle inventaris-tool voor kleine magazijnen
# Website: https://homebox.com
# =============================================================================

application:
  name: homebox
  version: 0.1.0
  description: "Homebox - Inventaris-tool"
  environment: "{{ environment | default('production') }}"
  
  owner:
    team: retail-team
    contact: retail@company.local
    slack: "#retail"
    documentation: "https://homebox.com/docs"
    
  hardware_requirements:
    compute:
      min_cpu_cores: 1
      min_ram_gb: 1
      recommended_cpu_cores: 2
      recommended_ram_gb: 2
      
    storage:
      - name: data
        size_gb: 10
        performance: ssd
        backup_required: true
        mount_path: /data
        
  network_requirements:
    vlans:
      - retail
      - internal
    ports:
      - container: 80
        host: 8080
        protocol: tcp
        public: false
        description: "Homebox web interface"
    dns:
      - "inventory.{{ domain }}"
      - "homebox.{{ domain }}"
      
  container:
    image: homebox/homebox:latest
    restart: unless-stopped
    resources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: "1"
        memory: 1Gi
        
  environment_variables:
    - name: HOMEBOX_DB_TYPE
      value: "sqlite"
      secret: false
    - name: HOMEBOX_DB_PATH
      value: "/data/homebox.db"
      secret: false
    - name: HOMEBOX_ADMIN_USER
      value: "admin"
      secret: false
    - name: HOMEBOX_ADMIN_PASSWORD
      value: "{{ vault_homebox_admin_password }}"
      secret: true
    - name: HOMEBOX_SITE_TITLE
      value: "Voorraadbeheer"
      secret: false
    - name: HOMEBOX_CURRENCY
      value: "EUR"
      secret: false
      
  health_checks:
    liveness:
      type: http
      path: /health
      port: 80