---
# Monitoring variabelen
prometheus_version: "2.48.0"
prometheus_retention: 30d
prometheus_scrape_interval: 30s

grafana_version: "10.2.3"
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_password }}"

loki_version: "2.9.4"
loki_retention: 720h

alertmanager_slack_channel: "#alerts"
alertmanager_email: "alerts@infraforge.local"

thresholds:
  cpu_warning: 80
  cpu_critical: 90
  memory_warning: 85
  memory_critical: 95
  disk_warning: 80
  disk_critical: 90
  load_warning: 5
  load_critical: 8

monitoring_targets:
  - job: node
    port: 9100
  - job: docker
    port: 9323
  - job: postgres
    port: 9187
  - job: redis
    port: 9121
