---
- name: Laad bonding kernel module
  ansible.builtin.modprobe:
    name: bonding
    state: present

- name: Configureer bond interface
  ansible.builtin.template:
    src: bond_redhat.j2
    dest: "/etc/sysconfig/network-scripts/ifcfg-bond0"
    mode: '0644'
  notify: restart networking

- name: Configureer slave interfaces
  ansible.builtin.template:
    src: bond_slave_redhat.j2
    dest: "/etc/sysconfig/network-scripts/ifcfg-{{ item }}"
    mode: '0644'
  loop: "{{ network_bonding_slaves }}"
  notify: restart networking
