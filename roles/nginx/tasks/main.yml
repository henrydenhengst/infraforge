---
- name: '{{ ansible_os_family }} | Installeer Nginx'
  ansible.builtin.package:
    name: "{{ nginx_packages[ansible_os_family] }}"
    state: present
  tags: [install]

- name: '{{ ansible_os_family }} | Configureer Nginx'
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  notify: reload nginx
  tags: [config]

- name: '{{ ansible_os_family }} | Configureer default site'
  ansible.builtin.template:
    src: default.conf.j2
    dest: /etc/nginx/conf.d/default.conf
    mode: '0644'
  notify: reload nginx
  tags: [config]

- name: '{{ ansible_os_family }} | Maak SSL directory'
  ansible.builtin.file:
    path: /etc/nginx/ssl
    state: directory
    mode: '0755'
  tags: [ssl]

- name: '{{ ansible_os_family }} | Start en enable Nginx'
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: yes
  tags: [service]

- name: '{{ ansible_os_family }} | Configureer Nginx monitoring'
  ansible.builtin.include_tasks: monitoring.yml
  when: nginx_monitoring_enabled | default(true)
  tags: [monitoring]
