---
- name: '{{ ansible_os_family }} | Maak WireGuard directories'
  ansible.builtin.file:
    path: "{{ wireguard_config_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start WireGuard container'
  ansible.builtin.docker_container:
    name: wireguard
    image: linuxserver/wireguard:latest
    restart_policy: unless-stopped
    ports:
      - "51820:51820/udp"
    volumes:
      - "{{ wireguard_config_path }}:/config"
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      PUID: 1000
      PGID: 1000
      TZ: "{{ timezone }}"
      SERVERURL: "wireguard.{{ domain }}"
      SERVERPORT: 51820
      PEERS: "{{ wireguard_peers }}"
      PEERDNS: "{{ wireguard_dns }}"
      INTERNAL_SUBNET: "{{ wireguard_subnet }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.wireguard.rule: "Host(`wireguard.{{ domain }}`)"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot WireGuard actief is'
  ansible.builtin.wait_for:
    port: 51820
    timeout: 60
  tags: [validate]

- name: Toon WireGuard configuratie
  ansible.builtin.debug:
    msg:
      - "WireGuard: wireguard.{{ domain }}:51820"
      - "Subnet: {{ wireguard_subnet }}"
      - "Peers: {{ wireguard_peers }}"
  tags: [validate]
