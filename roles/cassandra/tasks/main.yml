---
- name: '{{ ansible_os_family }} | Maak Cassandra directories'
  ansible.builtin.file:
    path: "{{ cassandra_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Cassandra container'
  ansible.builtin.docker_container:
    name: cassandra
    image: cassandra:4
    restart_policy: unless-stopped
    ports:
      - "9042:9042"
      - "9160:9160"
    volumes:
      - "{{ cassandra_data_path }}:/var/lib/cassandra"
    environment:
      CASSANDRA_CLUSTER_NAME: "{{ cassandra_cluster_name }}"
      CASSANDRA_NUM_TOKENS: 256
      CASSANDRA_DC: "{{ cassandra_datacenter }}"
      CASSANDRA_RACK: "{{ cassandra_rack }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.cassandra.rule: "Host(`cassandra.{{ domain }}`)"
      traefik.http.services.cassandra.loadbalancer.server.port: "9042"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Cassandra actief is'
  ansible.builtin.wait_for:
    port: 9042
    timeout: 120
  tags: [validate]

- name: Toon Cassandra informatie
  ansible.builtin.debug:
    msg:
      - "Cassandra: cassandra.{{ domain }}:9042"
      - "Cluster: {{ cassandra_cluster_name }}"
  tags: [validate]
