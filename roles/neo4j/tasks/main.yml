---
- name: '{{ ansible_os_family }} | Maak Neo4j directories'
  ansible.builtin.file:
    path: "{{ neo4j_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Neo4j container'
  ansible.builtin.docker_container:
    name: neo4j
    image: neo4j:latest
    restart_policy: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - "{{ neo4j_data_path }}:/data"
      - "{{ neo4j_data_path }}/logs:/logs"
      - "{{ neo4j_data_path }}/import:/import"
      - "{{ neo4j_data_path }}/plugins:/plugins"
    environment:
      NEO4J_AUTH: "{{ neo4j_user }}/{{ neo4j_password }}"
      NEO4J_dbms_memory_pagecache_size: "{{ neo4j_pagecache_size }}"
      NEO4J_dbms_memory_heap_initial__size: "{{ neo4j_heap_size }}"
      NEO4J_dbms_memory_heap_max__size: "{{ neo4j_heap_size }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.neo4j.rule: "Host(`neo4j.{{ domain }}`)"
      traefik.http.services.neo4j.loadbalancer.server.port: "7474"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Neo4j actief is'
  ansible.builtin.wait_for:
    port: 7474
    timeout: 60
  tags: [validate]

- name: Toon Neo4j informatie
  ansible.builtin.debug:
    msg:
      - "Neo4j Browser: https://neo4j.{{ domain }}"
      - "Bolt: neo4j.{{ domain }}:7687"
      - "Credentials: {{ neo4j_user }} / {{ neo4j_password }}"
  tags: [validate]
