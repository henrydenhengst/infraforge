---
- name: Verkrijg join command van master node
  ansible.builtin.shell: kubeadm token create --print-join-command
  register: join_command_result
  when: node_role == "master"
  tags: [kubeconfig]

- name: Sla join command op in hostvars
  ansible.builtin.set_fact:
    join_command: "{{ join_command_result.stdout }}"
    cacheable: yes
  when: node_role == "master"
  tags: [kubeconfig]

- name: Maak kubeconfig directory voor root
  ansible.builtin.file:
    path: "/root/.kube"
    state: directory
    mode: '0755'
  when: node_role == "master"
  tags: [kubeconfig]

- name: Kopieer admin kubeconfig naar root
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    owner: root
    group: root
    mode: '0600'
    remote_src: yes
  when: node_role == "master"
  tags: [kubeconfig]
