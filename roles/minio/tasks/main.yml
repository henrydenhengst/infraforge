---
- name: '{{ ansible_os_family }} | Maak MinIO directories'
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/minio
    - /opt/minio/data
    - /opt/minio/config
    - /var/log/minio
  tags: [directories]

- name: '{{ ansible_os_family }} | Creëer MinIO gebruiker'
  ansible.builtin.user:
    name: minio
    system: yes
    shell: /sbin/nologin
    create_home: no
  tags: [user]

- name: '{{ ansible_os_family }} | Download MinIO binary'
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-{{ arch_map[ansible_architecture] }}/minio"
    dest: /usr/local/bin/minio
    mode: '0755'
  tags: [install]

- name: '{{ ansible_os_family }} | Download MinIO Client'
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-{{ arch_map[ansible_architecture] }}/mc"
    dest: /usr/local/bin/mc
    mode: '0755'
  tags: [install]

- name: '{{ ansible_os_family }} | Configureer MinIO'
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/default/minio
    mode: '0644'
  tags: [config]

- name: '{{ ansible_os_family }} | Create MinIO systemd service'
  ansible.builtin.template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    mode: '0644'
  notify: restart minio
  tags: [service]

- name: '{{ ansible_os_family }} | Start en enable MinIO'
  ansible.builtin.systemd:
    name: minio
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [service]

- name: '{{ ansible_os_family }} | Wacht tot MinIO actief is'
  ansible.builtin.wait_for:
    port: 9000
    timeout: 60
  tags: [validate]

- name: '{{ ansible_os_family }} | Configureer MinIO buckets'
  ansible.builtin.include_tasks: buckets.yml
  when: minio_buckets is defined
  tags: [buckets]
