---
- name: Download Promtail
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-{{ arch_map[ansible_architecture] }}.zip"
    dest: "/tmp/promtail-linux-{{ arch_map[ansible_architecture] }}.zip"
  tags: [download]

- name: Extract Promtail
  ansible.builtin.unarchive:
    src: "/tmp/promtail-linux-{{ arch_map[ansible_architecture] }}.zip"
    dest: /usr/local/bin/
    remote_src: yes
    mode: '0755'
  tags: [extract]

- name: Configure Promtail
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: /etc/loki/promtail.yml
    mode: '0644'
  notify: restart promtail
  tags: [config]

- name: Create Promtail systemd service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  notify: restart promtail
  tags: [service]

- name: Start and enable Promtail
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [service]

- name: Cleanup Promtail temp files
  ansible.builtin.file:
    path: "/tmp/promtail-linux-{{ arch_map[ansible_architecture] }}.zip"
    state: absent
  tags: [cleanup]
