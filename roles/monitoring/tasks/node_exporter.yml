---
- name: Download Node Exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
  tags: [download]

- name: Extract Node Exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: /tmp/
    remote_src: yes
  tags: [extract]

- name: Install Node Exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ arch_map[ansible_architecture] }}/node_exporter"
    dest: "/usr/local/bin/node_exporter"
    mode: '0755'
    remote_src: yes
  tags: [install]

- name: Create Node Exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify: restart node_exporter
  tags: [service]

- name: Start and enable Node Exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [service]

- name: Cleanup Node Exporter temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    - "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ arch_map[ansible_architecture] }}"
  tags: [cleanup]
