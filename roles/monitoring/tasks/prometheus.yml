---
- name: Download Prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
  tags: [download]

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: /tmp/
    remote_src: yes
  tags: [extract]

- name: Install Prometheus binaries
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0755'
    remote_src: yes
  loop:
    - { src: "/tmp/prometheus-{{ prometheus_version }}.linux-{{ arch_map[ansible_architecture] }}/prometheus", dest: "/usr/local/bin/prometheus" }
    - { src: "/tmp/prometheus-{{ prometheus_version }}.linux-{{ arch_map[ansible_architecture] }}/promtool", dest: "/usr/local/bin/promtool" }
  tags: [install]

- name: Create Prometheus user
  ansible.builtin.user:
    name: "{{ monitoring_user }}"
    system: yes
    shell: /sbin/nologin
    create_home: no
  tags: [user]

- name: Configure Prometheus
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: '0644'
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
  notify: restart prometheus
  tags: [config]

- name: Configure Prometheus targets
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/prometheus/targets/{{ item | basename | regex_replace('\\.j2$', '') }}"
    mode: '0644'
  loop:
    - node_targets.yml.j2
    - cadvisor_targets.yml.j2
  notify: reload prometheus
  tags: [config]

- name: Configure Prometheus rules
  ansible.builtin.template:
    src: alerts.yml.j2
    dest: /etc/prometheus/rules/alerts.yml
    mode: '0644'
  notify: reload prometheus
  tags: [config]

- name: Create Prometheus systemd service
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  notify: restart prometheus
  tags: [service]

- name: Set ownership of Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ monitoring_user }}"
    group: "{{ monitoring_group }}"
    recurse: yes
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
  tags: [config]

- name: Start and enable Prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [service]

- name: Cleanup Prometheus temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/prometheus-{{ prometheus_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    - "/tmp/prometheus-{{ prometheus_version }}.linux-{{ arch_map[ansible_architecture] }}"
  tags: [cleanup]
