---
- name: Download Alertmanager
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: "/tmp/alertmanager-{{ alertmanager_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
  tags: [download]

- name: Extract Alertmanager
  ansible.builtin.unarchive:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: /tmp/
    remote_src: yes
  tags: [extract]

- name: Install Alertmanager binary
  ansible.builtin.copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-{{ arch_map[ansible_architecture] }}/alertmanager"
    dest: "/usr/local/bin/alertmanager"
    mode: '0755'
    remote_src: yes
  tags: [install]

- name: Install amtool
  ansible.builtin.copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-{{ arch_map[ansible_architecture] }}/amtool"
    dest: "/usr/local/bin/amtool"
    mode: '0755'
    remote_src: yes
  tags: [install]

- name: Configure Alertmanager
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /etc/prometheus/alertmanager.yml
    mode: '0644'
  notify: restart alertmanager
  tags: [config]

- name: Create Alertmanager systemd service
  ansible.builtin.template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    mode: '0644'
  notify: restart alertmanager
  tags: [service]

- name: Start and enable Alertmanager
  ansible.builtin.systemd:
    name: alertmanager
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [service]

- name: Cleanup Alertmanager temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/alertmanager-{{ alertmanager_version }}.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    - "/tmp/alertmanager-{{ alertmanager_version }}.linux-{{ arch_map[ansible_architecture] }}"
  tags: [cleanup]
