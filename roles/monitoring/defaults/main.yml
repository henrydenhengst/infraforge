---
# =============================================================================
# MONITORING ROLE DEFAULTS
# =============================================================================

# Monitoring user
monitoring_user: prometheus
monitoring_group: prometheus

# Prometheus configuratie
prometheus_scrape_interval: 30s
prometheus_evaluation_interval: 30s
prometheus_retention_days: 30
prometheus_listen_port: 9090

# Node Exporter configuratie
node_exporter_listen_port: 9100
node_exporter_collectors:
  - cpu
  - diskstats
  - filesystem
  - loadavg
  - meminfo
  - netdev
  - netstat
  - stat
  - systemd
  - textfile
  - time
  - uname

# cAdvisor configuratie
cadvisor_listen_port: 8080
cadvisor_docker_only: true
cadvisor_housekeeping_interval: 10s

# Grafana configuratie
grafana_listen_port: 3000
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_password }}"
grafana_dashboards_enabled: true

# Loki configuratie
loki_listen_port: 3100
loki_retention_days: 30

# Promtail configuratie
promtail_listen_port: 9080
promtail_scrape_interval: 30s

# Alertmanager configuratie
alertmanager_listen_port: 9093
alertmanager_slack_webhook: "{{ vault_slack_webhook }}"
