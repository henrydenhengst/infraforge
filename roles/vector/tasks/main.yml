---
- name: '{{ ansible_os_family }} | Maak Vector directories'
  ansible.builtin.file:
    path: "{{ vector_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Vector container'
  ansible.builtin.docker_container:
    name: vector
    image: timberio/vector:latest
    restart_policy: unless-stopped
    ports:
      - "8686:8686"
    volumes:
      - "{{ vector_data_path }}:/vector-data"
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: --config /etc/vector/vector.toml
    labels:
      traefik.enable: "true"
      traefik.http.routers.vector.rule: "Host(`vector.{{ domain }}`)"
      traefik.http.services.vector.loadbalancer.server.port: "8686"
  tags: [docker]

- name: '{{ ansible_os_family }} | Configureer Vector'
  ansible.builtin.template:
    src: vector.toml.j2
    dest: /etc/vector/vector.toml
    mode: '0644'
  notify: restart vector
  tags: [config]

- name: '{{ ansible_os_family }} | Wacht tot Vector actief is'
  ansible.builtin.wait_for:
    port: 8686
    timeout: 60
  tags: [validate]

- name: Toon Vector URL
  ansible.builtin.debug:
    msg: "Vector: https://vector.{{ domain }}"
  tags: [validate]
