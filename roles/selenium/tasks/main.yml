---
- name: '{{ ansible_os_family }} | Maak Selenium directories'
  ansible.builtin.file:
    path: "{{ selenium_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Selenium Grid Hub'
  ansible.builtin.docker_container:
    name: selenium-hub
    image: selenium/hub:latest
    restart_policy: unless-stopped
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    labels:
      traefik.enable: "true"
      traefik.http.routers.selenium.rule: "Host(`selenium.{{ domain }}`)"
      traefik.http.services.selenium.loadbalancer.server.port: "4444"
  tags: [docker]

- name: '{{ ansible_os_family }} | Start Selenium Chrome Node'
  ansible.builtin.docker_container:
    name: selenium-chrome
    image: selenium/node-chrome:latest
    restart_policy: unless-stopped
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
    depends_on:
      - selenium-hub
  tags: [docker]

- name: '{{ ansible_os_family }} | Start Selenium Firefox Node'
  ansible.builtin.docker_container:
    name: selenium-firefox
    image: selenium/node-firefox:latest
    restart_policy: unless-stopped
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
    depends_on:
      - selenium-hub
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Selenium actief is'
  ansible.builtin.wait_for:
    port: 4444
    timeout: 60
  tags: [validate]

- name: '{{ ansible_os_family }} | Toon Selenium URL'
  ansible.builtin.debug:
    msg: "Selenium Grid: https://selenium.{{ domain }}"
  tags: [validate]
