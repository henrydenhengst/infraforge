---
- name: '{{ ansible_os_family }} | Maak Logstash directories'
  ansible.builtin.file:
    path: "{{ logstash_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Logstash container'
  ansible.builtin.docker_container:
    name: logstash
    image: logstash:8.11.0
    restart_policy: unless-stopped
    ports:
      - "5044:5044"
      - "5000:5000"
      - "9600:9600"
    volumes:
      - "{{ logstash_data_path }}:/usr/share/logstash/data"
      - "{{ logstash_pipeline_path }}:/usr/share/logstash/pipeline"
    environment:
      LS_JAVA_OPTS: "-Xmx{{ logstash_heap_size }}"
      XPACK_MONITORING_ENABLED: "false"
    labels:
      traefik.enable: "true"
      traefik.http.routers.logstash.rule: "Host(`logstash.{{ domain }}`)"
      traefik.http.services.logstash.loadbalancer.server.port: "9600"
  tags: [docker]

- name: '{{ ansible_os_family }} | Configureer Logstash pipeline'
  ansible.builtin.template:
    src: logstash.conf.j2
    dest: "{{ logstash_pipeline_path }}/logstash.conf"
    mode: '0644'
  notify: restart logstash
  tags: [config]

- name: '{{ ansible_os_family }} | Wacht tot Logstash actief is'
  ansible.builtin.wait_for:
    port: 9600
    timeout: 120
  tags: [validate]

- name: Toon Logstash informatie
  ansible.builtin.debug:
    msg:
      - "Logstash: https://logstash.{{ domain }}"
      - "Beats input: 5044"
      - "TCP input: 5000"
  tags: [validate]
