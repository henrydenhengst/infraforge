---
- name: '{{ ansible_os_family }} | Maak Cortex directories'
  ansible.builtin.file:
    path: "{{ cortex_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Cortex container'
  ansible.builtin.docker_container:
    name: cortex
    image: cortexproject/cortex:latest
    restart_policy: unless-stopped
    ports:
      - "9009:9009"
      - "9090:9090"
    volumes:
      - "{{ cortex_data_path }}:/data"
    command: -config.file=/etc/cortex/config.yaml
    labels:
      traefik.enable: "true"
      traefik.http.routers.cortex.rule: "Host(`cortex.{{ domain }}`)"
      traefik.http.services.cortex.loadbalancer.server.port: "9090"
  tags: [docker]

- name: '{{ ansible_os_family }} | Configureer Cortex'
  ansible.builtin.template:
    src: cortex.yaml.j2
    dest: /etc/cortex/config.yaml
    mode: '0644'
  notify: restart cortex
  tags: [config]

- name: '{{ ansible_os_family }} | Wacht tot Cortex actief is'
  ansible.builtin.wait_for:
    port: 9090
    timeout: 60
  tags: [validate]

- name: Toon Cortex URL
  ansible.builtin.debug:
    msg: "Cortex: https://cortex.{{ domain }}"
  tags: [validate]
