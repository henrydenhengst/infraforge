---
- name: '{{ ansible_os_family }} | Installeer Jellyfin via Docker'
  ansible.builtin.include_tasks: docker.yml
  tags: [docker]

- name: '{{ ansible_os_family }} | Configureer Jellyfin'
  ansible.builtin.include_tasks: config.yml
  tags: [config]

- name: '{{ ansible_os_family }} | Start Jellyfin container'
  ansible.builtin.docker_container:
    name: jellyfin
    image: jellyfin/jellyfin:latest
    restart_policy: unless-stopped
    ports:
      - "8096:8096"
      - "8920:8920"
    volumes:
      - "{{ jellyfin_config_path }}:/config"
      - "{{ jellyfin_cache_path }}:/cache"
      - "{{ jellyfin_media_path }}:/media:ro"
    env:
      TZ: "{{ timezone }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.jellyfin.rule: "Host(`jellyfin.{{ domain }}`)"
      traefik.http.services.jellyfin.loadbalancer.server.port: "8096"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Jellyfin actief is'
  ansible.builtin.wait_for:
    port: 8096
    timeout: 60
  tags: [validate]
