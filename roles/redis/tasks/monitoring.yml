---
- name: Installeer Redis Exporter
  ansible.builtin.get_url:
    url: "https://github.com/oliver006/redis_exporter/releases/download/v1.55.0/redis_exporter-v1.55.0.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: "/tmp/redis_exporter.tar.gz"
  tags: [monitoring]

- name: Extract Redis Exporter
  ansible.builtin.unarchive:
    src: "/tmp/redis_exporter.tar.gz"
    dest: /tmp/
    remote_src: yes
  tags: [monitoring]

- name: Install Redis Exporter
  ansible.builtin.copy:
    src: "/tmp/redis_exporter-v1.55.0.linux-{{ arch_map[ansible_architecture] }}/redis_exporter"
    dest: "/usr/local/bin/redis_exporter"
    mode: '0755'
    remote_src: yes
  tags: [monitoring]

- name: Create Redis Exporter service
  ansible.builtin.template:
    src: redis_exporter.service.j2
    dest: /etc/systemd/system/redis_exporter.service
    mode: '0644'
  notify: restart redis_exporter
  tags: [monitoring]

- name: Start and enable Redis Exporter
  ansible.builtin.systemd:
    name: redis_exporter
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [monitoring]
