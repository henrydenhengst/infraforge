---
- name: Installeer MongoDB Exporter
  ansible.builtin.get_url:
    url: "https://github.com/percona/mongodb_exporter/releases/download/v0.40.0/mongodb_exporter-0.40.0.linux-{{ arch_map[ansible_architecture] }}.tar.gz"
    dest: "/tmp/mongodb_exporter.tar.gz"
  tags: [monitoring]

- name: Extract MongoDB Exporter
  ansible.builtin.unarchive:
    src: "/tmp/mongodb_exporter.tar.gz"
    dest: /tmp/
    remote_src: yes
  tags: [monitoring]

- name: Install MongoDB Exporter
  ansible.builtin.copy:
    src: "/tmp/mongodb_exporter-0.40.0.linux-{{ arch_map[ansible_architecture] }}/mongodb_exporter"
    dest: "/usr/local/bin/mongodb_exporter"
    mode: '0755'
    remote_src: yes
  tags: [monitoring]

- name: Create MongoDB Exporter service
  ansible.builtin.copy:
    dest: /etc/systemd/system/mongodb_exporter.service
    content: |
      [Unit]
      Description=MongoDB Exporter
      After=mongod.service

      [Service]
      Type=simple
      User=mongodb
      Group=mongodb
      Environment="MONGODB_URI=mongodb://admin:{{ mongodb_admin_password }}@localhost:{{ mongodb_port }}/admin"
      ExecStart=/usr/local/bin/mongodb_exporter --web.listen-address=:{{ mongodb_monitoring_port }}

      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: restart mongodb_exporter
  tags: [monitoring]

- name: Start and enable MongoDB Exporter
  ansible.builtin.systemd:
    name: mongodb_exporter
    state: started
    enabled: yes
    daemon_reload: yes
  tags: [monitoring]
