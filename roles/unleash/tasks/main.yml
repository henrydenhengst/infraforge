---
- name: '{{ ansible_os_family }} | Maak Unleash directories'
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ unleash_data_path }}"
    - "{{ unleash_data_path }}/postgres"
  tags: [directories]

- name: '{{ ansible_os_family }} | Start PostgreSQL for Unleash'
  ansible.builtin.docker_container:
    name: unleash-db
    image: postgres:15
    restart_policy: unless-stopped
    environment:
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: "{{ unleash_db_password }}"
      POSTGRES_DB: unleash
    volumes:
      - "{{ unleash_data_path }}/postgres:/var/lib/postgresql/data"
  tags: [docker]

- name: '{{ ansible_os_family }} | Start Unleash'
  ansible.builtin.docker_container:
    name: unleash
    image: unleashorg/unleash-server:latest
    restart_policy: unless-stopped
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: "postgres://unleash:{{ unleash_db_password }}@unleash-db:5432/unleash"
      DATABASE_SSL: "false"
    depends_on:
      - unleash-db
    labels:
      traefik.enable: "true"
      traefik.http.routers.unleash.rule: "Host(`flags.{{ domain }}`)"
      traefik.http.services.unleash.loadbalancer.server.port: "4242"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Unleash actief is'
  ansible.builtin.wait_for:
    port: 4242
    timeout: 60
  tags: [validate]

- name: '{{ ansible_os_family }} | Toon Unleash URL'
  ansible.builtin.debug:
    msg:
      - "Unleash: https://flags.{{ domain }}"
      - "Default credentials: admin / unleash4all"
  tags: [validate]
