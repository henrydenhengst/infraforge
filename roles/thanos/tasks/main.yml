---
- name: '{{ ansible_os_family }} | Maak Thanos directories'
  ansible.builtin.file:
    path: "{{ thanos_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Thanos sidecar'
  ansible.builtin.docker_container:
    name: thanos-sidecar
    image: thanosio/thanos:latest
    restart_policy: unless-stopped
    volumes:
      - /var/lib/prometheus:/prometheus
    command:
      - sidecar
      - --prometheus.url=http://prometheus:9090
      - --tsdb.path=/prometheus
      - --objstore.config-file=/etc/thanos/object-store.yaml
  tags: [docker]

- name: '{{ ansible_os_family }} | Start Thanos query'
  ansible.builtin.docker_container:
    name: thanos-query
    image: thanosio/thanos:latest
    restart_policy: unless-stopped
    ports:
      - "10902:10902"
    command:
      - query
      - --http-address=0.0.0.0:10902
      - --store=thanos-sidecar:10901
    labels:
      traefik.enable: "true"
      traefik.http.routers.thanos.rule: "Host(`thanos.{{ domain }}`)"
      traefik.http.services.thanos.loadbalancer.server.port: "10902"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Thanos actief is'
  ansible.builtin.wait_for:
    port: 10902
    timeout: 60
  tags: [validate]

- name: Toon Thanos URL
  ansible.builtin.debug:
    msg: "Thanos: https://thanos.{{ domain }}"
  tags: [validate]
