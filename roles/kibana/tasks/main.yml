---
- name: '{{ ansible_os_family }} | Start Kibana container'
  ansible.builtin.docker_container:
    name: kibana
    image: kibana:8.11.0
    restart_policy: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      SERVER_NAME: "kibana.{{ domain }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.kibana.rule: "Host(`kibana.{{ domain }}`)"
      traefik.http.services.kibana.loadbalancer.server.port: "5601"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Kibana actief is'
  ansible.builtin.wait_for:
    port: 5601
    timeout: 120
  tags: [validate]

- name: Toon Kibana URL
  ansible.builtin.debug:
    msg: "Kibana: https://kibana.{{ domain }}"
  tags: [validate]
