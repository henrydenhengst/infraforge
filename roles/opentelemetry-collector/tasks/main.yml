---
- name: '{{ ansible_os_family }} | Maak OpenTelemetry Collector directories'
  ansible.builtin.file:
    path: "{{ otel_collector_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start OpenTelemetry Collector container'
  ansible.builtin.docker_container:
    name: otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    restart_policy: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "13133:13133"
    volumes:
      - "{{ otel_collector_data_path }}:/data"
    command: --config /etc/otel/config.yaml
    labels:
      traefik.enable: "true"
      traefik.http.routers.otel.rule: "Host(`otel-collector.{{ domain }}`)"
      traefik.http.services.otel.loadbalancer.server.port: "8888"
  tags: [docker]

- name: '{{ ansible_os_family }} | Configureer OpenTelemetry Collector'
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/otel/config.yaml
    mode: '0644'
  notify: restart otel-collector
  tags: [config]

- name: '{{ ansible_os_family }} | Wacht tot OpenTelemetry Collector actief is'
  ansible.builtin.wait_for:
    port: 8888
    timeout: 60
  tags: [validate]

- name: Toon OpenTelemetry Collector URL
  ansible.builtin.debug:
    msg: "OpenTelemetry Collector: https://otel-collector.{{ domain }}"
  tags: [validate]
