---
# =============================================================================
# BASE ROLE VARIABELEN
# =============================================================================

# Basis packages per OS familie
common_packages:
  Debian:
    - curl
    - wget
    - git
    - vim
    - htop
    - tree
    - unzip
    - rsync
    - net-tools
    - dnsutils
    - traceroute
    - tcpdump
    - python3
    - python3-pip
    - python3-apt
    - python3-venv
    - ca-certificates
    - gnupg
    - lsb-release
    - software-properties-common

  RedHat:
    - curl
    - wget
    - git
    - vim-enhanced
    - htop
    - tree
    - unzip
    - rsync
    - net-tools
    - bind-utils
    - traceroute
    - tcpdump
    - python3
    - python3-pip
    - python3-dnf
    - ca-certificates
    - gnupg2
    - yum-utils

  Suse:
    - curl
    - wget
    - git
    - vim
    - htop
    - tree
    - unzip
    - rsync
    - net-tools
    - bind-utils
    - traceroute
    - tcpdump
    - python3
    - python3-pip
    - python3-zypp
    - ca-certificates
    - gnupg

  Archlinux:
    - curl
    - wget
    - git
    - vim
    - htop
    - tree
    - unzip
    - rsync
    - net-tools
    - bind-tools
    - traceroute
    - tcpdump
    - python
    - python-pip
    - ca-certificates

  Alpine:
    - curl
    - wget
    - git
    - vim
    - htop
    - tree
    - unzip
    - rsync
    - net-tools
    - bind-tools
    - traceroute
    - tcpdump
    - python3
    - py3-pip
    - ca-certificates

# NTP packages per OS
ntp_package:
  Debian: chrony
  RedHat: chrony
  Suse: chrony
  Archlinux: chrony
  Alpine: chrony

# NTP service namen per OS
ntp_service:
  Debian: chrony
  RedHat: chronyd
  Suse: chronyd
  Archlinux: chronyd
  Alpine: chronyd

# Kernel parameters per OS
kernel_parameters:
  Debian:
    - name: net.ipv4.ip_forward
      value: 0
    - name: net.ipv4.conf.all.send_redirects
      value: 0
    - name: net.ipv4.conf.default.send_redirects
      value: 0
    - name: net.ipv4.tcp_syncookies
      value: 1
    - name: net.ipv4.conf.all.rp_filter
      value: 1
    - name: net.ipv4.conf.default.rp_filter
      value: 1
    - name: kernel.randomize_va_space
      value: 2

  RedHat:
    - name: net.ipv4.ip_forward
      value: 0
    - name: net.ipv4.conf.all.send_redirects
      value: 0
    - name: net.ipv4.conf.default.send_redirects
      value: 0
    - name: net.ipv4.tcp_syncookies
      value: 1
    - name: fs.suid_dumpable
      value: 0
    - name: kernel.randomize_va_space
      value: 2

  Suse:
    - name: net.ipv4.ip_forward
      value: 0
    - name: net.ipv4.conf.all.send_redirects
      value: 0
    - name: kernel.randomize_va_space
      value: 2

  Archlinux:
    - name: net.ipv4.ip_forward
      value: 0
    - name: kernel.randomize_va_space
      value: 2
    - name: fs.inotify.max_user_watches
      value: 524288

  Alpine:
    - name: net.ipv4.ip_forward
      value: 0
    - name: kernel.randomize_va_space
      value: 2
