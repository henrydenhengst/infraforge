---
- name: '{{ ansible_os_family }} | Maak Kafka directories'
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ kafka_data_path }}"
    - "{{ kafka_data_path }}/data"
    - "{{ kafka_data_path }}/logs"
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Zookeeper'
  ansible.builtin.docker_container:
    name: zookeeper
    image: confluentinc/cp-zookeeper:latest
    restart_policy: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  tags: [docker]

- name: '{{ ansible_os_family }} | Start Kafka'
  ansible.builtin.docker_container:
    name: kafka
    image: confluentinc/cp-kafka:latest
    restart_policy: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - "{{ kafka_data_path }}/data:/var/lib/kafka/data"
    depends_on:
      - zookeeper
    labels:
      traefik.enable: "true"
      traefik.http.routers.kafka.rule: "Host(`kafka.{{ domain }}`)"
      traefik.http.services.kafka.loadbalancer.server.port: "9092"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Kafka actief is'
  ansible.builtin.wait_for:
    port: 9092
    timeout: 120
  tags: [validate]

- name: Toon Kafka informatie
  ansible.builtin.debug:
    msg:
      - "Kafka: kafka.{{ domain }}:9092"
      - "Zookeeper: zookeeper:2181"
  tags: [validate]
