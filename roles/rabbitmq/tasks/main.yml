---
- name: '{{ ansible_os_family }} | Maak RabbitMQ directories'
  ansible.builtin.file:
    path: "{{ rabbitmq_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start RabbitMQ container'
  ansible.builtin.docker_container:
    name: rabbitmq
    image: rabbitmq:3-management
    restart_policy: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - "{{ rabbitmq_data_path }}:/var/lib/rabbitmq"
    environment:
      RABBITMQ_DEFAULT_USER: "{{ rabbitmq_default_user }}"
      RABBITMQ_DEFAULT_PASS: "{{ rabbitmq_default_pass }}"
      RABBITMQ_DEFAULT_VHOST: "{{ rabbitmq_default_vhost }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.rabbitmq.rule: "Host(`rabbitmq.{{ domain }}`)"
      traefik.http.services.rabbitmq.loadbalancer.server.port: "15672"
  tags: [docker]

- name: '{{ ansible_os_family }} | Configureer RabbitMQ plugins'
  ansible.builtin.shell: |
    docker exec rabbitmq rabbitmq-plugins enable rabbitmq_management rabbitmq_web_dispatch
  tags: [plugins]

- name: '{{ ansible_os_family }} | Wacht tot RabbitMQ actief is'
  ansible.builtin.wait_for:
    port: 5672
    timeout: 60
  tags: [validate]

- name: Toon RabbitMQ informatie
  ansible.builtin.debug:
    msg:
      - "RabbitMQ AMQP: rabbitmq.{{ domain }}:5672"
      - "RabbitMQ Management: https://rabbitmq.{{ domain }}"
      - "Default credentials: {{ rabbitmq_default_user }} / {{ rabbitmq_default_pass }}"
  tags: [validate]
