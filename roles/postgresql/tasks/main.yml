---
# =============================================================================
# POSTGRESQL ROLE - PostgreSQL database installatie en configuratie
# =============================================================================
# Deze role installeert en configureert PostgreSQL database
# =============================================================================

- name: '{{ ansible_os_family }} | Installeer PostgreSQL'
  ansible.builtin.package:
    name: "{{ postgresql_packages[ansible_os_family] }}"
    state: present
  tags: [install]

- name: '{{ ansible_os_family }} | Start en enable PostgreSQL'
  ansible.builtin.service:
    name: "{{ postgresql_service[ansible_os_family] }}"
    state: started
    enabled: yes
  tags: [service]

- name: '{{ ansible_os_family }} | Configureer PostgreSQL'
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "{{ postgresql_config_path[ansible_os_family] }}/postgresql.conf"
    owner: postgres
    group: postgres
    mode: '0644'
  notify: restart postgresql
  tags: [config]

- name: '{{ ansible_os_family }} | Configureer pg_hba.conf'
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgresql_config_path[ansible_os_family] }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: '0600'
  notify: restart postgresql
  tags: [config]

- name: '{{ ansible_os_family }} | Maak databases aan'
  ansible.builtin.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner | default('postgres') }}"
    encoding: "{{ item.encoding | default('UTF8') }}"
    template: "{{ item.template | default('template0') }}"
    state: present
  loop: "{{ postgresql_databases }}"
  become_user: postgres
  when: postgresql_databases is defined
  tags: [databases]

- name: '{{ ansible_os_family }} | Maak database gebruikers aan'
  ansible.builtin.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password }}"
    role_attr_flags: "{{ item.flags | default('LOGIN') }}"
    state: present
  loop: "{{ postgresql_users }}"
  become_user: postgres
  when: postgresql_users is defined
  tags: [users]

- name: '{{ ansible_os_family }} | Verleen privileges aan gebruikers'
  ansible.builtin.postgresql_privs:
    database: "{{ item.database }}"
    roles: "{{ item.user }}"
    privs: "{{ item.privs | default('ALL') }}"
    type: "{{ item.type | default('database') }}"
    objs: "{{ item.objs | default(omit) }}"
  loop: "{{ postgresql_privileges }}"
  become_user: postgres
  when: postgresql_privileges is defined
  tags: [privileges]

- name: '{{ ansible_os_family }} | Installeer PostgreSQL extensions'
  ansible.builtin.postgresql_ext:
    name: "{{ item.name }}"
    db: "{{ item.database }}"
    state: present
  loop: "{{ postgresql_extensions }}"
  become_user: postgres
  when: postgresql_extensions is defined
  tags: [extensions]

- name: '{{ ansible_os_family }} | Configureer PostgreSQL backups'
  ansible.builtin.include_tasks: backup.yml
  when: postgresql_backup_enabled | default(true)
  tags: [backup]

- name: '{{ ansible_os_family }} | Configureer PostgreSQL monitoring'
  ansible.builtin.include_tasks: monitoring.yml
  when: postgresql_monitoring_enabled | default(true)
  tags: [monitoring]

- name: '{{ ansible_os_family }} | Valideer PostgreSQL configuratie'
  ansible.builtin.shell: |
    sudo -u postgres psql -c "SELECT version();"
  register: psql_test
  changed_when: false
  tags: [validate]

- name: Toon PostgreSQL versie
  ansible.builtin.debug:
    var: psql_test.stdout_lines
  when: psql_test.stdout is defined
  tags: [validate]
