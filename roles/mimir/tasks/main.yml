---
- name: '{{ ansible_os_family }} | Maak Mimir directories'
  ansible.builtin.file:
    path: "{{ mimir_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Mimir container'
  ansible.builtin.docker_container:
    name: mimir
    image: grafana/mimir:latest
    restart_policy: unless-stopped
    ports:
      - "8080:8080"
      - "9095:9095"
    volumes:
      - "{{ mimir_data_path }}:/data"
    command: -config.file=/etc/mimir/mimir.yaml
    labels:
      traefik.enable: "true"
      traefik.http.routers.mimir.rule: "Host(`mimir.{{ domain }}`)"
      traefik.http.services.mimir.loadbalancer.server.port: "8080"
  tags: [docker]

- name: '{{ ansible_os_family }} | Configureer Mimir'
  ansible.builtin.template:
    src: mimir.yaml.j2
    dest: /etc/mimir/mimir.yaml
    mode: '0644'
  notify: restart mimir
  tags: [config]

- name: '{{ ansible_os_family }} | Wacht tot Mimir actief is'
  ansible.builtin.wait_for:
    port: 8080
    timeout: 60
  tags: [validate]

- name: Toon Mimir URL
  ansible.builtin.debug:
    msg: "Mimir: https://mimir.{{ domain }}"
  tags: [validate]
