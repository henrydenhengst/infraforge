---
- name: '{{ ansible_os_family }} | Maak Guacamole directories'
  ansible.builtin.file:
    path: "{{ guacamole_data_path }}"
    state: directory
    mode: '0755'
  tags: [directories]

- name: '{{ ansible_os_family }} | Start Guacamole database'
  ansible.builtin.docker_container:
    name: guacamole-db
    image: postgres:15
    restart_policy: unless-stopped
    environment:
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: "{{ guacamole_db_password }}"
      POSTGRES_DB: guacamole
    volumes:
      - "{{ guacamole_data_path }}/db:/var/lib/postgresql/data"
  tags: [docker]

- name: '{{ ansible_os_family }} | Start Guacamole daemon'
  ansible.builtin.docker_container:
    name: guacd
    image: guacamole/guacd:latest
    restart_policy: unless-stopped
    ports:
      - "4822:4822"
  tags: [docker]

- name: '{{ ansible_os_family }} | Start Guacamole client'
  ansible.builtin.docker_container:
    name: guacamole
    image: guacamole/guacamole:latest
    restart_policy: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRES_HOSTNAME: guacamole-db
      POSTGRES_DATABASE: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: "{{ guacamole_db_password }}"
    depends_on:
      - guacd
      - guacamole-db
    labels:
      traefik.enable: "true"
      traefik.http.routers.guacamole.rule: "Host(`remote.{{ domain }}`)"
      traefik.http.services.guacamole.loadbalancer.server.port: "8080"
  tags: [docker]

- name: '{{ ansible_os_family }} | Wacht tot Guacamole actief is'
  ansible.builtin.wait_for:
    port: 8080
    timeout: 60
  tags: [validate]

- name: Toon Guacamole informatie
  ansible.builtin.debug:
    msg:
      - "Guacamole: https://remote.{{ domain }}"
      - "Default credentials: guacadmin / guacadmin"
  tags: [validate]
