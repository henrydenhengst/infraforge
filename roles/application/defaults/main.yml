---
# =============================================================================
# APPLICATION ROLE DEFAULTS
# =============================================================================

# Applicaties om te deployen
apps_to_deploy: []

# Docker netwerken
docker_networks: "{{ default_docker_networks }}"

# Reverse proxy configuratie
configure_proxy: true
proxy_type: nginx  # nginx, traefik, caddy

# Monitoring
monitoring_enabled: true
metrics_endpoint: /metrics
health_endpoint: /health

# Backup
backup_enabled: true
backup_schedule: "0 2 * * *"
backup_retention_days: 30

# Resource limits
default_cpu_limit: "1"
default_memory_limit: "1G"
default_cpu_reservation: "0.5"
default_memory_reservation: "512M"

# Logging
log_driver: json-file
log_max_size: 10m
log_max_files: 3

# Health checks
health_check_interval: 30s
health_check_timeout: 10s
health_check_retries: 3
health_check_start_period: 30s

# Environment variables
environment: production
domain: "{{ domain | default('company.local') }}"
